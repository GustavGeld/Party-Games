    '... sich im falschen Hotel einchecken', '... versuchen mit Händen und Füßen zu sprechen',
    '... den Flug verpassen weil man eingeschlafen ist', '... ein schreckliches Souvenir kaufen',
    '... im Urlaub krank werden', '... eine Liege reservieren und nie kommen',
    '... sich weigern lokales Essen zu probieren', '... die Reise mit einer Excel-Tabelle planen',
    '... am Strand einschlafen und einen Sonnenbrand bekommen', '... sein Handy im Meer versenken'
  ]},
  { id: 'schule', name: 'Beruf & Schule', emoji: '🏢', tasks: [
    '... in einer wichtigen Zoom-Konferenz einschlafen', '... den Chef versehentlich "Schatz" nennen',
    '... eine peinliche Mail an den falschen Verteiler schicken', '... Hausaufgaben vom Nachbarn abschreiben',
    '... bei einer Präsentation den roten Faden verlieren', '... zu spät kommen und eine schlechte Ausrede haben',
    '... heimlich unter dem Tisch essen', '... im Unterricht/Meeting laut schnarchen',
    '... den Namen eines Kollegen seit Jahren falsch sagen', '... die Kaffeemaschine im Büro kaputt machen',
    '... versuchen sich mit Kaffee vor einem Kater zu retten'
  ]}
];

const Schuldspruch = {
  name: "Schuldspruch",
  tagline: "Wer würde am ehesten...?",
  color: "#ff3b30",
  shadow: "rgba(255, 59, 48, 0.4)",
  glow: "rgba(255, 59, 48, 0.2)",
  emoji: "👉",

  state: {
    mode: null,
    players: [],
    maxRounds: 5,
    voteTime: 15,
    activePackageIds: ['allgemein'],
    currentRound: 0,
    scores: {},
    phase: 'setup',
    currentQuestion: '',
    votes: {}, // playerId -> targetId (online)
    offlineVotes: {}, // index -> voteCount (offline)
    timeLeft: 0,
    timerInterval: null,
    questionPool: []
  },

  /* ================= UNIFIED LOBBY HOOKS ================= */
  collectOnlineSettings() {
    return {
      maxRounds: this.state.maxRounds,
      voteTime: this.state.voteTime,
      activePackageIds: [...this.state.activePackageIds]
    };
  },

  onOnlineGameStart(settings) {
    this.state.mode = 'online';
    this.state.maxRounds = parseInt(settings.maxRounds) || 5;
    this.state.voteTime = parseInt(settings.voteTime) || 15;
    this.state.activePackageIds = settings.activePackageIds || ['allgemein'];
    this.state.currentRound = 1;
    this.state.scores = {};
    this.state.players.forEach(p => this.state.scores[p.id] = 0);
    this.prepareQuestionPool();
    this.startNewOnlineRound();
  },

  handleOnlineData(data, conn) {
    if (Multiplayer.role !== 'host') {
        if (data.type === 'sync_state') {
            this.state = {...this.state, ...data.state};
            this.renderOnlineGame();
        } else if (data.type === 'return_lobby') {
            UnifiedLobby._renderGuestLobby();
        }
        return;
    }

    // HOST Logic
    if (data.type === 'vote') {
        this.state.votes[data.playerId] = data.targetId;
        // Check if all voted
        if (Object.keys(this.state.votes).length >= this.state.players.length) {
            this.resolveOnlineRound();
        } else {
            this.broadcastState();
            this.renderOnlineGame();
        }
    }
  },

  /* ================= OPEN & SETUP ================= */
  open() {
    Router.go('setup');
    document.getElementById('setup-title').textContent = this.name;
    document.getElementById('setup-content').innerHTML = `
      <div class="card">
        <div class="card-label">Wähle deinen Modus</div>
        <button class="btn-primary" style="margin-bottom:15px; background:var(--green); color:#000;" onclick="Schuldspruch.setupOffline()">
           📱 Offline (Ein Gerät teilen)
        </button>
        <button class="btn-primary" onclick="UnifiedLobby.open(Schuldspruch)">
           🌐 Online (Jeder ein Gerät)
        </button>
      </div>
    `;
  },

  prepareQuestionPool() {
    this.state.questionPool = [];
    this.state.activePackageIds.forEach(pid => {
        const pkg = SchuldspruchPackages.find(p => p.id === pid);
        if (pkg) this.state.questionPool.push(...pkg.tasks);
    });
    this.shuffleArray(this.state.questionPool);
  },

  setupOffline() {
    this.state.mode = 'offline';
    this.state.players = ['Spieler 1', 'Spieler 2', 'Spieler 3'];
    this.state.maxRounds = 5;
    this.state.activePackageIds = ['allgemein'];
    this.renderOfflineSetup();
  },

  renderOfflineSetup() {
    document.getElementById('setup-content').innerHTML = `
      <div class="card">
        <div class="card-label">👥 Spieler (Min. 3)</div>
        <div class="players-list" id="fz-players-list"></div>
        <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin-top:10px; font-size: 0.9rem;" onclick="Schuldspruch.addOfflinePlayer()">＋ Spieler hinzufügen</button>
      </div>

      <div class="card">
        <div class="card-label">📦 Kategorien</div>
        <div id="fz-pkg-grid"></div>
      </div>

      <div class="card">
        <div class="card-label">⏱️ Rundenanzahl</div>
        <div style="display:flex; align-items:center; gap:10px;">
           <input type="range" class="styled-range" min="1" max="21" step="1" value="${this.state.maxRounds > 20 ? 21 : this.state.maxRounds}" 
             style="--pct: ${(( (this.state.maxRounds > 20 ? 21 : this.state.maxRounds) - 1) / (21 - 1)) * 100}%"
             oninput="
               const val = parseInt(this.value);
               document.getElementById('fz-rounds-val').textContent = val > 20 ? 'Endlos' : val; 
               Schuldspruch.state.maxRounds = val > 20 ? 999 : val;
               this.style.setProperty('--pct', ((val - this.min) / (this.max - this.min)) * 100 + '%');
             ">
           <span id="fz-rounds-val" style="font-weight:bold; width: 60px; text-align:right;">${this.state.maxRounds > 20 ? 'Endlos' : this.state.maxRounds}</span>
        </div>
      </div>

      <button class="btn-primary" onclick="Schuldspruch.startOfflineGame()">🚀 Weiter</button>
    `;
    this.renderOfflinePlayersList();
    this.renderPackages('fz-pkg-grid');
  },

  renderOfflinePlayersList() {
    const list = document.getElementById('fz-players-list');
    if (!list) return;
    list.innerHTML = this.state.players.map((p, i) => `
      <div style="display:flex; gap:10px; margin-bottom:8px;">
        <input type="text" class="player-input" value="${p}" onchange="Schuldspruch.updateOfflinePlayer(${i}, this.value)">
        ${this.state.players.length > 3 ? `<button class="btn-icon" onclick="Schuldspruch.removeOfflinePlayer(${i})">✕</button>` : ''}
      </div>
    `).join('');
  },

  addOfflinePlayer() {
    this.state.players.push(`Spieler ${this.state.players.length + 1}`);
    this.renderOfflinePlayersList();
  },

  removeOfflinePlayer(idx) {
    if (this.state.players.length <= 3) return;
    this.state.players.splice(idx, 1);
    this.renderOfflinePlayersList();
  },

  updateOfflinePlayer(idx, val) {
    if (val.trim()) this.state.players[idx] = val.trim();
  },

  renderPackages(containerId) {
    PackageManager.renderGrid({
        namespace: 'Schuldspruch',
        targetId: containerId,
        packages: SchuldspruchPackages,
        activeIds: this.state.activePackageIds,
        isMulti: true,
        countSuffix: 'Fragen',
        onToggle: (id) => {
            if (this.state.activePackageIds.includes(id)) {
                if (this.state.activePackageIds.length <= 1) return alert("Mindestens ein Paket muss aktiv sein!");
                this.state.activePackageIds = this.state.activePackageIds.filter(pid => pid !== id);
            } else {
                this.state.activePackageIds.push(id);
            }
            this.renderPackages(containerId);
            if (this.state.mode === 'online' && Multiplayer.role === 'host') {
                UnifiedLobby._updateHostLobby(); 
            }
        }
    });
  },

  /* ================= OFFLINE GAME ================= */
  startOfflineGame() {
    this.state.currentRound = 1;
    this.state.scores = {};
    this.state.players.forEach((_, i) => this.state.scores[i] = 0);
    this.prepareQuestionPool();
    this.startNewOfflineRound();
  },

  startNewOfflineRound() {
    this.state.phase = 'voting';
    if (this.state.questionPool.length === 0) this.prepareQuestionPool(); // reshuffle if empty
    this.state.currentQuestion = this.state.questionPool.pop();
    this.state.offlineVotes = {};
    this.state.players.forEach((_, i) => this.state.offlineVotes[i] = 0);
    
    Router.go('play');
    document.getElementById('play-game-name').textContent = 'Schuldspruch';
    this.renderOfflineGame();
  },

  renderOfflineGame() {
    const s = this.state;
    if (s.phase === 'results') return this.renderResults();

    let ht = '';
    if (s.phase === 'voting') {
        ht = `
          <div style="font-size:0.75rem; background:var(--surface2); padding:4px 10px; border-radius:10px; margin-bottom:8px; display:inline-block;">
            Runde <b>${s.currentRound}</b> ${s.maxRounds > 20 ? '' : ` / ${s.maxRounds}`}
          </div>
          <div class="card" style="text-align:center; padding: 25px 15px; margin-bottom:15px; background:var(--primary-dim); border: 2px solid var(--primary);">
            <h2 style="font-size:1.6rem; line-height:1.3; margin:0;">Wer würde am ehesten ${s.currentQuestion}?</h2>
            ${s.maxRounds > 20 ? `<button class="btn-primary" style="background:var(--primary); color:#fff; font-size:0.8rem; margin-top:20px; padding:5px 10px; width:auto;" onclick="Schuldspruch.renderResults()">Spiel beenden</button>` : ''}
          </div>
          <p style="text-align:center; color:var(--text-muted); margin-bottom:15px; font-size:0.9rem;">Sammelt die Stimmen aller Spieler. Gebt dazu das Handy weiter oder tippt gemeinsam ab.</p>
          <div style="display:flex; flex-direction:column; gap:10px;">
            ${s.players.map((p, i) => `
                <div style="background:var(--surface2); border-radius:10px; padding:10px 15px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; font-size:1.1rem;">${p}</span>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span style="font-size:1.2rem; min-width:30px; text-align:center;">${s.offlineVotes[i]}</span>
                        <button class="btn-primary" style="margin:0; width:50px; font-size:1.5rem; background:var(--primary); color:#fff; padding:5px;" onclick="Schuldspruch.addOfflineVote(${i})">+1</button>
                    </div>
                </div>
            `).join('')}
          </div>
          <button class="btn-primary" style="margin-top:25px;" onclick="Schuldspruch.resolveOfflineRound()">Auswertung</button>
        `;
    } else if (s.phase === 'round_result') {
        // Find winners
        let maxVotes = -1;
        let winners = [];
        Object.keys(s.offlineVotes).forEach(i => {
            if (s.offlineVotes[i] > maxVotes) {
               maxVotes = s.offlineVotes[i];
               winners = [s.players[i]];
            } else if (s.offlineVotes[i] === maxVotes) {
               winners.push(s.players[i]);
            }
        });

        ht = `
          <div class="card" style="text-align:center; padding: 40px 20px;">
            <h2 style="color:var(--text-muted); font-size:1rem; margin-bottom:10px;">Auswertung</h2>
            <h3 style="font-size:1.6rem; margin-bottom:30px; line-height:1.3;">Wer würde am ehesten ${s.currentQuestion}?</h3>
            
            <div style="font-size:4rem; margin-bottom:10px;">👇</div>
            <div style="font-size:2.5rem; font-weight:bold; color:var(--primary); line-height:1.1; margin-bottom:10px;">
               ${maxVotes > 0 ? winners.join(' & ') : 'Niemand'}
            </div>
            <p style="color:var(--text-muted); margin-bottom:30px;">mit ${maxVotes} Stimmen</p>
            
            <button class="btn-primary" onclick="Schuldspruch.nextRoundOffline()">Weiter (${s.currentRound}/${s.maxRounds})</button>
          </div>
        `;
    }
    
    document.getElementById('play-content').innerHTML = ht;
  },

  addOfflineVote(idx) {
      this.state.offlineVotes[idx]++;
      this.renderOfflineGame();
  },

  resolveOfflineRound() {
      // Find winners and distribute points
      let maxVotes = -1;
      let winners = [];
      Object.keys(this.state.offlineVotes).forEach(i => {
          if (this.state.offlineVotes[i] > maxVotes) {
             maxVotes = this.state.offlineVotes[i];
             winners = [i];
          } else if (this.state.offlineVotes[i] === maxVotes) {
             winners.push(i);
          }
      });

      if (maxVotes > 0) {
          winners.forEach(i => {
              this.state.scores[i]++;
          });
      }

      this.state.phase = 'round_result';
      this.renderOfflineGame();
  },

  nextRoundOffline() {
      if (this.state.currentRound >= this.state.maxRounds) {
          this.state.phase = 'results';
          this.renderResults();
      } else {
          this.state.currentRound++;
          this.startNewOfflineRound();
      }
  },

  /* ================= ONLINE SPECIFIC ================= */
  renderHostSetup() {
    return `
      <div class="card">
        <div class="card-label">📦 Kategorien</div>
        <div id="fz-pkg-grid-on"></div>
      </div>
      <div class="card">
        <div class="card-label">⏱️ Rundenanzahl</div>
        <div style="display:flex; align-items:center; gap:10px;">
           <input type="range" class="styled-range" min="1" max="21" step="1" value="${this.state.maxRounds > 20 ? 21 : this.state.maxRounds}" 
             style="--pct: ${(( (this.state.maxRounds > 20 ? 21 : this.state.maxRounds) - 1) / (21 - 1)) * 100}%"
             oninput="
               const val = parseInt(this.value);
               document.getElementById('fz-rounds-val-on').textContent = val > 20 ? 'Endlos' : val; 
               Schuldspruch.state.maxRounds = val > 20 ? 999 : val;
               this.style.setProperty('--pct', ((val - this.min) / (this.max - this.min)) * 100 + '%');
             ">
           <span id="fz-rounds-val-on" style="font-weight:bold; width: 60px; text-align:right;">${this.state.maxRounds > 20 ? 'Endlos' : this.state.maxRounds}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-label">⏳ Zeit für Abstimmung (Sekunden)</div>
        <div style="display:flex; align-items:center; gap:10px;">
           <input type="range" class="styled-range" min="5" max="60" step="5" value="${this.state.voteTime}" 
             style="--pct: ${((this.state.voteTime - 5) / (60 - 5)) * 100}%"
             oninput="
               document.getElementById('fz-time-val-on').textContent = this.value; 
               Schuldspruch.state.voteTime = parseInt(this.value);
               this.style.setProperty('--pct', ((this.value - this.min) / (this.max - this.min)) * 100 + '%');
             ">
           <span id="fz-time-val-on" style="font-weight:bold; width: 30px; text-align:right;">${this.state.voteTime}</span>
        </div>
      </div>
    `;
  },

  onHostLobbyRendered() {
    this.renderPackages('fz-pkg-grid-on');
  },

  startNewOnlineRound() {
      this.state.phase = 'voting';
      if (this.state.questionPool.length === 0) this.prepareQuestionPool();
      this.state.currentQuestion = this.state.questionPool.pop();
      this.state.votes = {};
      this.state.timeLeft = this.state.voteTime;
      
      this.broadcastState();
      
      Router.go('play');
      document.getElementById('play-game-name').textContent = 'Schuldspruch';
      this.renderOnlineGame();

      // Start timer
      clearInterval(this.state.timerInterval);
      this.state.timerInterval = setInterval(() => {
          this.state.timeLeft--;
          if (this.state.timeLeft <= 0) {
              clearInterval(this.state.timerInterval);
              this.resolveOnlineRound();
          } else {
              this.broadcastState(); // send updated time
              this.renderOnlineGame();
          }
      }, 1000);
  },

  broadcastState() {
      Multiplayer.sendGameState({
          type: 'sync_state',
          state: {
              phase: this.state.phase,
              currentQuestion: this.state.currentQuestion,
              scores: this.state.scores,
              currentRound: this.state.currentRound,
              players: this.state.players.map(p => ({ id: p.id, name: p.name })),
              timeLeft: this.state.timeLeft,
              votes: this.state.votes,
              maxRounds: this.state.maxRounds
          }
      });
  },

  renderOnlineGame() {
      const s = this.state;
      if (s.phase === 'results') return this.renderResults();

      const myId = Multiplayer.role === 'host' ? 'host-1' : Multiplayer.myId;
      const iVoted = !!s.votes[myId];

      let ht = '';
      if (s.phase === 'voting') {
          ht = `
            <div style="font-size:0.75rem; background:var(--surface2); padding:4px 10px; border-radius:10px; margin-bottom:8px; display:inline-block;">
              Runde <b>${s.currentRound}</b> ${s.maxRounds > 20 ? '' : ` / ${s.maxRounds}`}
            </div>
            <div class="card" style="text-align:center; padding: 25px 15px; margin-bottom:15px; background:var(--primary-dim); border: 2px solid var(--primary);">
              <h2 style="font-size:1.6rem; line-height:1.3; margin:0;">Wer würde am ehesten ${s.currentQuestion}?</h2>
              ${s.maxRounds > 20 && Multiplayer.role === 'host' ? `<button class="btn-primary" style="background:var(--primary); color:#fff; font-size:0.8rem; margin-top:15px; padding:5px 10px; width:auto;" onclick="Schuldspruch.renderResults()">Spiel beenden</button>` : ''}
            </div>
            
            <div style="text-align:center; margin-bottom:20px; font-weight:bold; color:var(--primary); font-size:1.5rem;">
               ⏱️ ${s.timeLeft}s
            </div>

            ${!iVoted ? `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    ${s.players.map(p => `
                        <div style="background:var(--surface); border:1px solid var(--border); padding:20px; text-align:center; border-radius:15px; cursor:pointer;" onclick="Schuldspruch.submitOnlineVote('${p.id}')">
                           <div style="font-size:1.2rem; font-weight:bold;">${p.name}</div>
                        </div>
                    `).join('')}
                </div>
            ` : `
                <div class="card" style="text-align:center; padding:30px 20px;">
                    <div style="font-size:3rem; margin-bottom:10px;">✅</div>
                    <h3>Stimme abgegeben!</h3>
                    <p style="color:var(--text-muted);">Warte auf die anderen Spieler...</p>
                    <p style="margin-top:10px;">${Object.keys(s.votes).length} / ${s.players.length} haben abgestimmt.</p>
                </div>
            `}
          `;
      } else if (s.phase === 'round_result') {
          // Calculate max votes from s.votes
          let voteCounts = {};
          s.players.forEach(p => voteCounts[p.id] = 0);
          Object.values(s.votes).forEach(targetId => {
              if (voteCounts[targetId] !== undefined) voteCounts[targetId]++;
          });
          
          let maxVotes = -1;
          let winners = [];
          Object.keys(voteCounts).forEach(id => {
              if (voteCounts[id] > maxVotes) {
                 maxVotes = voteCounts[id];
                 winners = [s.players.find(p=>p.id===id).name];
              } else if (voteCounts[id] === maxVotes) {
                 winners.push(s.players.find(p=>p.id===id).name);
              }
          });

          ht = `
            <div class="card" style="text-align:center; padding: 40px 20px;">
              <h2 style="color:var(--text-muted); font-size:1rem; margin-bottom:10px;">Auswertung</h2>
              <h3 style="font-size:1.6rem; margin-bottom:30px; line-height:1.3;">Wer würde am ehesten ${s.currentQuestion}?</h3>
              
              <div style="font-size:4rem; margin-bottom:10px;">👇</div>
              <div style="font-size:2.5rem; font-weight:bold; color:var(--primary); line-height:1.1; margin-bottom:10px;">
                 ${maxVotes > 0 ? winners.join(' & ') : 'Niemand'}
              </div>
              <p style="color:var(--text-muted); margin-bottom:30px;">mit ${maxVotes} Stimmen</p>
              
              ${Multiplayer.role === 'host' ? `
                   <button class="btn-primary" onclick="Schuldspruch.nextRoundOnline()">Weiter (${s.currentRound}/${s.maxRounds})</button>
              ` : '<p style="color:var(--text-muted);">Warte auf den Host...</p>'}
            </div>
          `;
      }
      
      document.getElementById('play-content').innerHTML = ht;
  },

  submitOnlineVote(targetId) {
      const myId = Multiplayer.role === 'host' ? 'host-1' : Multiplayer.myId;
      if (Multiplayer.role === 'host') {
          this.handleOnlineData({ type: 'vote', playerId: myId, targetId: targetId });
      } else {
          Multiplayer.sendToHost({ type: 'vote', playerId: myId, targetId: targetId });
          // Optimistic local update
          this.state.votes[myId] = targetId;
          this.renderOnlineGame();
      }
  },

  resolveOnlineRound() {
      clearInterval(this.state.timerInterval);
      
      // Tally votes
      let voteCounts = {};
      this.state.players.forEach(p => voteCounts[p.id] = 0);
      Object.values(this.state.votes).forEach(targetId => {
          if (voteCounts[targetId] !== undefined) voteCounts[targetId]++;
      });
      
      let maxVotes = -1;
      let winners = [];
      Object.keys(voteCounts).forEach(id => {
          if (voteCounts[id] > maxVotes) {
             maxVotes = voteCounts[id];
             winners = [id];
          } else if (voteCounts[id] === maxVotes) {
             winners.push(id);
          }
      });

      if (maxVotes > 0) {
          winners.forEach(id => {
              this.state.scores[id]++;
          });
      }

      this.state.phase = 'round_result';
      this.broadcastState();
      this.renderOnlineGame();
  },

  nextRoundOnline() {
      if (this.state.currentRound >= this.state.maxRounds) {
          this.state.phase = 'results';
          this.broadcastState();
          this.renderResults();
      } else {
          this.state.currentRound++;
          this.startNewOnlineRound();
      }
  },

  /* ================= RESULTS ================= */
  renderResults() {
    clearInterval(this.state.timerInterval);
    this.state.phase = 'results';
    const s = this.state;
    let winners = [];
    let maxScore = -1;
    
    if (this.state.mode === 'online') {
        s.players.forEach(p => {
            if (s.scores[p.id] > maxScore) {
                maxScore = s.scores[p.id];
                winners = [p.name];
            } else if (s.scores[p.id] === maxScore) {
                winners.push(p.name);
            }
        });
    } else {
        s.players.forEach((name, i) => {
            if (s.scores[i] > maxScore) {
                maxScore = s.scores[i];
                winners = [name];
            } else if (s.scores[i] === maxScore) {
                winners.push(name);
            }
        });
    }

    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding:50px 20px;">
        <h1 style="font-size:3.5rem; margin-bottom:10px; font-family:'Abril Fatface', cursive;">🏆 Sieg!</h1>
        <h2 style="color:var(--primary); margin-bottom:40px; font-size:2rem;">${winners.join(' & ')}</h2>
        
        <div class="card-label">Finale Punkte</div>
        <div style="background:var(--surface2); padding:20px; border-radius:15px; margin-bottom:40px;">
            ${(this.state.mode === 'online' ? s.players.map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${p.name}</span>
                    <b style="color:var(--secondary)">${s.scores[p.id]} Pkt.</b>
                </div>
            `) : s.players.map((name, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${name}</span>
                    <b style="color:var(--secondary)">${s.scores[i]} Pkt.</b>
                </div>
            `)).join('')}
        </div>
        
        ${this.state.mode === 'online' && Multiplayer.role === 'host' ? `
            <button class="btn-primary" onclick="Schuldspruch.startNewOnlineRound(); Schuldspruch.state.currentRound=1; Schuldspruch.state.scores={}; Schuldspruch.state.players.forEach(p=>Schuldspruch.state.scores[p.id]=0);">Nochmal spielen</button>
        ` : ''}
        ${this.state.mode === 'offline' ? `
            <button class="btn-primary" onclick="Schuldspruch.startOfflineGame()">Nochmal spielen</button>
        ` : ''}

        <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin-top:10px;" onclick="Schuldspruch.open()">Hauptmenü</button>
        ${this.state.mode === 'online' ? `<button class="btn-primary" style="background:var(--surface2); color:var(--text); margin-top:10px;" onclick="Schuldspruch.returnToLobby()">Lobby</button>` : ''}
      </div>
    `;

    if (this.state.mode === 'online' && Multiplayer.role === 'host') {
        this.broadcastState();
    }
  },

  returnToLobby() {
    if (this.state.mode === 'offline') {
        this.open();
    } else {
        if (Multiplayer.role === 'host') {
            Multiplayer.sendGameState({ type: 'return_lobby' });
            UnifiedLobby._updateHostLobby();
        } else {
            UnifiedLobby._renderGuestLobby();
        }
    }
  },

  /* ================= HELPERS ================= */
  shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
  }
};

</script>

/* ===================================================
   ===================================================
   STRAFE GAME — LOGIC LAYER
   ===================================================
=================================================== */

const StrafenGame = {

  /* ---------- STATE ---------- */
  state: {
    players: ['Anna', 'Bert', 'Clara', 'David'],
    maxPenalty: 5,
    activePackageIds: ['classic'],
    taskPool: [],
    taskIndex: 0,
    currentTask: null,
    majorityVotes: [0, 0],
  },

  /* =================================================
     SETUP – Einstellungs-UI
  ================================================= */

  renderSetup() {
    document.getElementById('setup-title').textContent = 'Strafe – Setup';
    const s = this.state;

    document.getElementById('setup-content').innerHTML = `

      <!-- SPIELER -->
      <div class="card">
        <div class="card-label">👥 Spieler</div>
        <div class="players-list" id="players-list"></div>
        <button class="btn-add" onclick="StrafenGame.addPlayer()">＋ Spieler hinzufügen</button>
      </div>

      <!-- PAKETE -->
      <div class="card">
        <div class="card-label">📦 Inhaltspakete</div>
        <div class="packages-grid" id="packages-grid"></div>
      </div>

      <!-- MAXIMALE STRAFE -->
      <div class="card">
        <div class="card-label">⚡ Maximale Strafe</div>
        <div class="penalty-big" id="penalty-display">${s.maxPenalty}</div>
        <div class="penalty-unit">max. Strafen pro Aufgabe</div>
        <input
          type="range"
          class="styled-range"
          id="penalty-range"
          min="1" max="20"
          value="${s.maxPenalty}"
          oninput="StrafenGame.onPenaltyInput(this)"
        >
      </div>

      <!-- VALIDIERUNGSHINWEIS -->
      <div id="setup-warn"></div>

      <button class="btn-primary" id="start-btn" onclick="StrafenGame.start()">
        🚀 Spiel starten
      </button>
    `;

    this.renderPlayerList();
    this.renderPackages();
    this.syncRangeStyle(document.getElementById('penalty-range'));
    this.validateStart();
  },

  /* Spielerliste rendern */
  renderPlayerList() {
    const { players } = this.state;
    setHTML('players-list', players.map((name, i) => `
      <div class="player-row">
        <div class="player-avatar">${i + 1}</div>
        <input
          class="player-input"
          type="text"
          value="${name}"
          placeholder="Spieler ${i + 1}"
          oninput="StrafenGame.setPlayerName(${i}, this.value)"
        >
        ${players.length > 2
          ? `<button class="btn-icon" title="Entfernen" onclick="StrafenGame.removePlayer(${i})">✕</button>`
          : ''}
      </div>
    `).join(''));
  },

  /* Pakete rendern */
  renderPackages() {
    const { activePackageIds } = this.state;
    setHTML('packages-grid', StrafenPackages.map(pkg => `
      <div
        class="pkg-card ${activePackageIds.includes(pkg.id) ? 'active' : ''}"
        onclick="StrafenGame.togglePackage('${pkg.id}')"
      >
        <span class="pkg-check">✓</span>
        <div class="pkg-emoji">${pkg.emoji}</div>
        <div class="pkg-name">${pkg.name}</div>
        <div class="pkg-count">${pkg.tasks.length} Aufgaben</div>
      </div>
    `).join(''));
  },

  /* Spieler hinzufügen */
  addPlayer() {
    if (this.state.players.length >= 12) return;
    this.state.players.push(`Spieler ${this.state.players.length + 1}`);
    this.renderPlayerList();
    this.validateStart();
  },

  /* Spieler entfernen */
  removePlayer(index) {
    if (this.state.players.length <= 2) return;
    this.state.players.splice(index, 1);
    this.renderPlayerList();
    this.validateStart();
  },

  /* Spielername setzen */
  setPlayerName(index, value) {
    this.state.players[index] = value;
    this.validateStart();
  },

  /* Paket aktivieren / deaktivieren */
  togglePackage(id) {
    const ids = this.state.activePackageIds;
    const idx = ids.indexOf(id);
    if (idx > -1) {
      if (ids.length === 1) return; // Mindestens 1 Paket muss aktiv sein
      ids.splice(idx, 1);
    } else {
      ids.push(id);
    }
    this.renderPackages();
    this.validateStart();
  },

  /* Slider-Event */
  onPenaltyInput(range) {
    this.state.maxPenalty = parseInt(range.value);
    const el = document.getElementById('penalty-display');
    if (el) { el.textContent = range.value; restartAnimation(el); }
    this.syncRangeStyle(range);
  },

  /* Slider-Füllfarbe synchronisieren */
  syncRangeStyle(range) {
    if (!range) return;
    const pct = ((range.value - range.min) / (range.max - range.min)) * 100;
    range.style.setProperty('--pct', pct + '%');
  },

  /* Start-Button freigeben / sperren */
  validateStart() {
    const btn  = document.getElementById('start-btn');
    const warn = document.getElementById('setup-warn');
    const validPlayers  = this.state.players.filter(p => p.trim()).length >= 2;
    const validPackages = this.state.activePackageIds.length > 0;
    const ok = validPlayers && validPackages;

    if (btn)  btn.disabled = !ok;
    if (warn) {
      warn.innerHTML = !ok
        ? `<div class="warn-badge">⚠️ ${!validPlayers ? 'Mindestens 2 Spieler mit Namen erforderlich.' : 'Mindestens 1 Paket muss ausgewählt sein.'}</div>`
        : '';
    }
  },

  /* =================================================
     GAME LOGIC – Task-System
  ================================================= */

  /** Alle Tasks der aktiven Pakete zusammenführen & mischen */
  buildTaskPool() {
    let pool = [];
    for (const pkg of StrafenPackages) {
      if (this.state.activePackageIds.includes(pkg.id)) {
        pool.push(...pkg.tasks);
      }
    }
    this.state.taskPool  = shuffle(pool);
    this.state.taskIndex = 0;
  },

  /** Nächsten Task holen; bei Erschöpfung neu mischen */
  getNextTask() {
    if (this.state.taskIndex >= this.state.taskPool.length) {
      this.state.taskPool  = shuffle(this.state.taskPool);
      this.state.taskIndex = 0;
    }
    return this.state.taskPool[this.state.taskIndex++];
  },

  /** n Spieler zufällig auswählen (ohne leere Namen) */
  getRandomPlayers(n) {
    const valid = this.state.players.filter(p => p.trim());
    return sample(valid, Math.min(n, valid.length));
  },

  /**
   * Platzhalter im Task-Text ersetzen:
   * {p1} {p2} {p3}  → Spielernamen (farbig)
   * {players}       → Kommagetrennte Liste aller gewählten Spieler
   * {penalty}       → Animierte Strafen-Pill
   */
  resolveText(text, players, penalty) {
    // Hilfsfunktion für farbige Spielernamen
    const hi = (name, cls = 'hi') => `<span class="${cls}">${name}</span>`;
    const pill = `<span class="penalty-pill">${penalty}</span>`;

    const clsMap = ['hi', 'hi2', 'hi3'];

    return text
      .replace(/\{p1\}/g,      hi(players[0] || '?', clsMap[0]))
      .replace(/\{p2\}/g,      hi(players[1] || '?', clsMap[1]))
      .replace(/\{p3\}/g,      hi(players[2] || '?', clsMap[2]))
      .replace(/\{players\}/g, players.map((p, i) => hi(p, clsMap[i % 3])).join(', '))
      .replace(/\{penalty\}/g, pill);
  },

  /* =================================================
     GAME FLOW – Start & Navigation
  ================================================= */

  start() {
    this.buildTaskPool();
    document.getElementById('play-game-name').textContent = 'Strafe ⚡';
    Router.go('play');
    this.showNextTask();
  },

  showNextTask() {
    const task    = this.getNextTask();
    this.state.currentTask      = task;
    this.state.majorityVotes    = [0, 0];
    const penalty = randomInt(1, this.state.maxPenalty);

    let html = '';

    switch (task.type) {
      case 'majority':
        html = this.buildMajorityHTML(task, penalty);
        break;
      case 'duel':
        html = this.buildStandardHTML(task, penalty, '⚔️ Duell', 'type-duel');
        break;
      case 'group':
        html = this.buildStandardHTML(task, penalty, '👥 Gruppenaufgabe', 'type-group');
        break;
      case 'single':
        html = this.buildStandardHTML(task, penalty, '🎯 Einzelaufgabe', 'type-single');
        break;
      case 'multi':
        html = this.buildStandardHTML(task, penalty, '🎲 Teamaufgabe', 'type-multi');
        break;
      default:
        html = this.buildStandardHTML(task, penalty, '🃏 Aufgabe', '');
    }

    const content = setHTML('play-content', html);
    // Task-Card-Animation neu starten
    if (content) restartAnimation(content.querySelector('.task-card'));
  },

  /* =================================================
     HTML BUILDER – Standard Task
  ================================================= */

  buildStandardHTML(task, penalty, badgeLabel, typeClass) {
    const count   = task.count || 2;
    const players = this.getRandomPlayers(count);
    const text    = this.resolveText(task.text, players, penalty);

    return `
      <div class="task-card ${typeClass}">
        <div class="task-badge">${badgeLabel}</div>
        <div class="task-text">${text}</div>
      </div>
      <button class="btn-next" onclick="StrafenGame.showNextTask()">
        Nächste Aufgabe &nbsp;→
      </button>
    `;
  },

  /* =================================================
     HTML BUILDER – Majority (Abstimmung)
  ================================================= */

  buildMajorityHTML(task, penalty) {
    return `
      <div class="task-card type-majority">
        <div class="task-badge">🗳️ Mehrheitsfrage</div>
        <div class="majority-q">${task.question}</div>

        <div class="vote-row">
          <div class="vote-opt" id="vopt-0">
            <div class="vote-label">${task.options[0]}</div>
            <div class="vote-num"  id="vnum-0">0</div>
            <div class="vote-btns">
              <button class="btn-minus" onclick="StrafenGame.vote(0, -1)">−</button>
              <button class="btn-plus"  onclick="StrafenGame.vote(0,  1)">＋</button>
            </div>
          </div>
          <div class="vote-opt" id="vopt-1">
            <div class="vote-label">${task.options[1]}</div>
            <div class="vote-num"  id="vnum-1">0</div>
            <div class="vote-btns">
              <button class="btn-minus" onclick="StrafenGame.vote(1, -1)">−</button>
              <button class="btn-plus"  onclick="StrafenGame.vote(1,  1)">＋</button>
            </div>
          </div>
        </div>

        <p class="vote-hint">Tippt ＋ für jeden Spieler der sich entscheidet</p>

        <button class="btn-eval" id="btn-eval" onclick="StrafenGame.evaluateMajority(${penalty})">
          ⚖️ Auswerten
        </button>

        <div id="majority-result"></div>
      </div>

      <div id="next-wrapper"></div>
    `;
  },

  /* Stimme hinzufügen / abziehen */
  vote(optIdx, delta) {
    this.state.majorityVotes[optIdx] =
      Math.max(0, this.state.majorityVotes[optIdx] + delta);

    const numEl  = document.getElementById(`vnum-${optIdx}`);
    const optEl  = document.getElementById(`vopt-${optIdx}`);
    if (numEl) {
      numEl.textContent = this.state.majorityVotes[optIdx];
      restartAnimation(numEl);
    }
    if (optEl) {
      optEl.classList.toggle('has-votes', this.state.majorityVotes[optIdx] > 0);
    }
  },

  /* Abstimmung auswerten */
  evaluateMajority(penalty) {
    const [v0, v1] = this.state.majorityVotes;
    const task = this.state.currentTask;
    let resultHTML = '';

    if (v0 === 0 && v1 === 0) {
      setHTML('majority-result', `
        <div class="majority-result">
          <div class="result-icon">🤔</div>
          <div class="result-text">Bitte erst abstimmen!</div>
        </div>`);
      return;
    }

    if (v0 === v1) {
      resultHTML = `
        <div class="majority-result">
          <div class="result-icon">🤝</div>
          <div class="result-text">Gleichstand! <strong>Alle</strong> bekommen <span class="pen">${penalty}</span> Strafen!</div>
        </div>`;
    } else {
      const minIdx  = v0 < v1 ? 0 : 1;
      const majIdx  = 1 - minIdx;
      const minOpt  = task.options[minIdx];
      const majOpt  = task.options[majIdx];
      const minVote = this.state.majorityVotes[minIdx];
      const majVote = this.state.majorityVotes[majIdx];

      resultHTML = `
        <div class="majority-result">
          <div class="result-icon">🎉</div>
          <div class="result-text">
            Mehrheit: <strong>${majOpt}</strong> (${majVote} Stimmen)<br>
            Minderheit: <strong>${minOpt}</strong> (${minVote} Stimmen)<br><br>
            → <strong>${minOpt}</strong>-Fraktion bekommt <span class="pen">${penalty}</span> Strafen!
          </div>
        </div>`;
    }

    setHTML('majority-result', resultHTML);

    // "Weiter"-Button einblenden
    setHTML('next-wrapper', `
      <button class="btn-next" style="margin-top:14px;" onclick="StrafenGame.showNextTask()">
        Nächste Aufgabe &nbsp;→
      </button>`);

    // Auswerten-Button deaktivieren
    const evalBtn = document.getElementById('btn-eval');
    if (evalBtn) { evalBtn.disabled = true; evalBtn.textContent = '✓ Ausgewertet'; }
  },
};

</script>
<script>
/* === wortorakel.js === */
const WortOrakelPackages = [
  { id: 'allgemein', name: 'Allgemein', emoji: '💡', tasks: ['Elefant', 'Feuerwehr', 'Pizza', 'Schach', 'Internet', 'Kaffee', 'Taschenlampe', 'Donald Duck', 'Super Mario', 'Eiffelturm', 'Zahnarzt', 'Hubschrauber', 'Gitarre', 'Mikrowelle', 'Kühlschrank', 'Postbote', 'Regenschirm', 'Taxi', 'Kino', 'Strand'] },

const WortOrakel = {
  name: "Wort-Orakel",
  tagline: "Wer bin ich? Errate deinen geheimen Begriff!",
  color: "#a855f7",
  shadow: "rgba(168, 85, 247, 0.4)",
  glow: "rgba(168, 85, 247, 0.2)",
  emoji: "🔮",
  
  state: {
    mode: null,
    players: [],
    useOwnWords: false,
    activePackageIds: ['allgemein'],
    phase: 'setup', // setup, input, viewing, play
    words: {}, // playerId -> entered word
    assignedWords: {}, // playerId -> word they need to guess
    doneStatus: {}, // playerId -> boolean (guessed it)
    viewingIndex: 0, // for offline viewing phase
    myWordInput: ''
  },

  /* ================= UNIFIED LOBBY HOOKS ================= */
  
  collectOnlineSettings() {
    return {
      useOwnWords: this.state.useOwnWords,
      activePackageIds: [...this.state.activePackageIds]
    };
  },

  onOnlineGameStart(settings) {
    this.state.mode = 'online';
    this.state.useOwnWords = settings.useOwnWords;
    this.state.activePackageIds = settings.activePackageIds || ['allgemein'];
    this.state.phase = 'input';
    this.state.words = {};
    this.state.assignedWords = {};
    this.state.doneStatus = {};
    this.state.myWordInput = '';

    Router.go('play');
    document.getElementById('play-game-name').textContent = 'Wort-Orakel';
    this.renderOnlineInput();
  },

  handleOnlineData(data, conn) {
    const s = this.state;
    if (Multiplayer.role === 'host') {
      if (data.type === 'submit_word') {
        s.words[data.playerId] = data.word;
        this.checkAllWordsSubmitted();
      } else if (data.type === 'guessed_it') {
        s.doneStatus[data.playerId] = true;
        this.broadcastState();
        this.renderHostGame();
      }
    } else {
      if (data.type === 'sync_phase') {
        s.phase = data.phase;
        s.assignedWords = data.assignedWords;
        s.doneStatus = data.doneStatus;
        s.players = data.players;
        this.renderOnlineGame();
      } else if (data.type === 'return_lobby') {
        UnifiedLobby._renderGuestLobby();
      }
    }
  },

  /* ================= CORE LOGIC ================= */

  open() {
    Router.go('setup');
    document.getElementById('setup-title').textContent = 'Wort-Orakel';
    document.getElementById('setup-content').innerHTML = `
      <div class="card">
        <div class="card-label">Wähle deinen Modus</div>
        <button class="btn-primary" style="margin-bottom:15px; background:var(--green); color:#000;" onclick="WortOrakel.setupOffline()">
           📱 Offline (Ein Gerät teilen)
        </button>
        <button class="btn-primary" onclick="UnifiedLobby.open(WortOrakel)">
           🌐 Online (Jeder ein Gerät)
        </button>
      </div>
    `;
  },

  setupOffline() {
    this.state.mode = 'offline';
    this.state.players = ['Spieler 1', 'Spieler 2', 'Spieler 3'];
    this.state.useOwnWords = false;
    this.renderOfflineSetup();
  },

  renderOfflineSetup() {
    let ht = `
      <div class="card">
        <div class="card-label">👥 Spieler verwalten</div>
        <div class="players-list" id="wo-players-list"></div>
        <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin-top:10px; font-size: 0.9rem;" onclick="WortOrakel.addOfflinePlayer()">＋ Spieler hinzufügen</button>

      <div class="card">
        <div class="card-label">⚙️ Spiel-Optionen</div>
        <div style="display:flex; flex-direction:column; gap:15px;">
           <div style="display:flex; align-items:center; justify-content:space-between; background:var(--surface2); padding:15px; border-radius:12px; cursor:pointer;" onclick="document.getElementById('wo-own-toggle').click()">
              <div style="text-align:left;">
                <strong style="display:block; font-size:1.1rem;">Eigene Begriffe</strong>
                <small style="color:var(--text-muted);">Jeder denkt sich ein Wort für die anderen aus.</small>
              </div>
              <div class="toggle-switch">
                <input type="checkbox" id="wo-own-toggle" ${this.state.useOwnWords ? 'checked' : ''} onchange="WortOrakel.state.useOwnWords = this.checked; WortOrakel.renderOfflineSetup()">

        </div>
      </div>
      
      ${!this.state.useOwnWords ? `
      <div class="card">
        <div class="card-label">📦 Wort-Pakete</div>
        <div id="wo-pkg-grid"></div>
      </div>
      ` : ''}

      <button class="btn-primary" id="wo-start-btn" onclick="WortOrakel.startOfflineGame()">🚀 Weiter</button>
    `;
    document.getElementById('setup-content').innerHTML = ht;
    this.renderOfflinePlayersList();
    if (!this.state.useOwnWords) this.renderPackages();
  },

  renderOfflinePlayersList() {
    const list = document.getElementById('wo-players-list');
    if(!list) return;
    list.innerHTML = this.state.players.map((name, i) => `
      <div class="player-row">
        <div class="player-avatar">${i + 1}</div>
        <input class="player-input" type="text" value="${name}" placeholder="Spieler ${i + 1}" oninput="WortOrakel.state.players[${i}] = this.value">
        ${this.state.players.length > 2 ? `<button class="btn-icon" onclick="WortOrakel.removeOfflinePlayer(${i})">✕</button>` : ''}
      </div>
    `).join('');
  },

  addOfflinePlayer() {
    this.state.players.push(`Spieler ${this.state.players.length + 1}`);
    this.renderOfflineSetup();
  },

  removeOfflinePlayer(i) {
    if(this.state.players.length > 2) this.state.players.splice(i, 1);
    this.renderOfflineSetup();
  },

  renderPackages() {
    PackageManager.renderGrid({
        namespace: 'WortOrakel',
        targetId: 'wo-pkg-grid',
        packages: WortOrakelPackages,
        activeIds: this.state.activePackageIds,
        isMulti: true,
        onToggle: (id) => {
            const ids = this.state.activePackageIds;
            const idx = ids.indexOf(id);
            if (idx > -1) {
                if (ids.length > 1) ids.splice(idx, 1);
            } else {
                ids.push(id);
            }
            this.renderPackages();
        }
    });
  },

  startOfflineGame() {
    this.state.phase = 'input';
    this.state.words = {};
    this.state.viewingIndex = 0;
    Router.go('play');
    document.getElementById('play-game-name').textContent = 'Wort-Orakel';
    
    if (this.state.useOwnWords) {
      this.renderOfflineInput(0);
    } else {
      this.assignPackageWords();
      this.renderOfflineViewing(0);
    }
  },

  /* ================= OFFLINE INPUT ================= */
  renderOfflineInput(playerIdx) {
    const name = this.state.players[playerIdx];
    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 20px;">
        <div class="card-label">Eingabe: Spieler ${playerIdx + 1} / ${this.state.players.length}</div>
        <h2 style="margin-bottom:10px;">${name}</h2>
        <p style="color:var(--text-muted); margin-bottom:30px;">Denk dir einen Begriff für jemand anderen aus!</p>
        
        <input type="text" id="wo-input-field" class="player-input" style="font-size:1.5rem; text-align:center; padding:15px; margin-bottom:20px;" placeholder="z.B. Zitrone">
        
        <button class="btn-primary" onclick="WortOrakel.submitOfflineWord(${playerIdx})">Festlegen</button>
      </div>
    `;
    setTimeout(() => document.getElementById('wo-input-field').focus(), 100);
  },

  submitOfflineWord(idx) {
    const val = document.getElementById('wo-input-field').value.trim();
    if (!val) return;
    this.state.words[idx] = val;
    
    if (idx + 1 < this.state.players.length) {
      this.renderOfflineInput(idx + 1);
    } else {
      this.assignDerangement();
      this.renderOfflineViewing(0);
    }
  },

  assignDerangement() {
    const n = this.state.players.length;
    let wordPool = Object.values(this.state.words);
    
    let assigned = {};
    let attempts = 0;
    while(attempts < 100) {
      let shuffledPool = [...wordPool];
      this.shuffleArray(shuffledPool);
      
      let valid = true;
      for(let i=0; i<n; i++) {
        if (shuffledPool[i] === this.state.words[i]) {
          valid = false;
          break;
        }
      }
      
      if (valid) {
        for(let i=0; i<n; i++) assigned[i] = shuffledPool[i];
        break;
      }
      attempts++;
    }
    
    if (Object.keys(assigned).length === 0) {
        for(let i=0; i<n; i++) assigned[i] = wordPool[(i+1)%n];
    }
    
    this.state.assignedWords = assigned;
  },

  assignPackageWords() {
    let pool = [];
    WortOrakelPackages.forEach(pkg => {
        if (this.state.activePackageIds.includes(pkg.id)) {
            pool = pool.concat(pkg.tasks);
        }
    });
    this.shuffleArray(pool);
    this.state.assignedWords = {};
    this.state.players.forEach((p, i) => {
      this.state.assignedWords[i] = pool[i % pool.length];
    });
  },

  /* ================= OFFLINE VIEWING ================= */
  renderOfflineViewing(playerIdx) {
    const targetName = this.state.players[playerIdx];
    const word = this.state.assignedWords[playerIdx];
    
    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 20px;">
        <div class="card-label">Wort-Check: ${playerIdx + 1} / ${this.state.players.length}</div>
        <p style="margin-bottom:10px;">Das Wort für</p>
        <h2 style="color:var(--primary); font-size:2.5rem; margin-bottom:20px;">${targetName}</h2>
        
        <div id="wo-secret-area" 
             style="background:var(--surface2); padding:30px; border-radius:15px; cursor:pointer; min-height:140px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; border: 2px dashed var(--border); transition: all 0.3s ease;" 
             onclick="WortOrakel.revealWord(this, '${word.replace(/'/g, "\\'")}')">
          <span style="font-weight:bold; color:var(--text-muted); text-align:center; line-height:1.4;">
             KLICKEN ZUM AUFDECKEN<br>
             <span style="font-size:0.8rem; opacity:0.8;">(Alle außer ${targetName} dürfen schauen!)</span>
          </span>
        </div>
        
        <button class="btn-primary" onclick="${playerIdx + 1 < this.state.players.length ? `WortOrakel.renderOfflineViewing(${playerIdx+1})` : `WortOrakel.renderOfflineGameStart()`}">Weiter</button>
      </div>
    `;
  },

  revealWord(el, word) {
    el.innerHTML = `<span style="font-size:2.2rem; font-weight:bold; color:var(--primary); animation: pop 0.3s ease-out;">${word}</span>`;
    el.style.border = '2px solid var(--primary)';
    el.style.background = 'var(--primary-dim)';
    el.style.transform = 'scale(1.02)';
  },

  renderOfflineGameStart() {
    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 50px 20px;">
        <h1 style="font-size:3rem; margin-bottom:20px;">🎯 Los geht's!</h1>
        <p style="font-size:1.1rem; color:var(--text-muted); margin-bottom:40px;">Das Spiel beginnt. Findet heraus, wer ihr seid!<br><br>Falls jemand seinen Begriff vergessen hat, könnt ihr ihn unten kurz nachschauen.</p>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:30px;">
          ${this.state.players.map((name, i) => `
            <div style="background:var(--surface2); border:1px solid var(--border); border-radius:15px; text-align:left; cursor:pointer; padding:16px; transition: all 0.2s;" onclick="WortOrakel.togglePeek(this, ${i})">
              <div style="font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px;">${name}</div>
              <div class="peek" style="display:none; font-weight:bold; color:var(--primary); font-size:1.2rem; animation: pop 0.25s ease-out;">${this.state.assignedWords[i]}</div>
              <div class="name-display" style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; font-size:1.1rem;">${name}</div>
            </div>
          `).join('')}
        </div>
        
        <button class="btn-primary" onclick="WortOrakel.startOfflineGame()">Nochmal spielen</button>
        <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin-top:10px;" onclick="WortOrakel.open()">Hauptmenü</button>
      </div>
    `;
  },

  togglePeek(el, idx) {
    const peek = el.querySelector('.peek');
    const name = el.querySelector('.name-display');
    const isActive = peek.style.display === 'block';

    if (isActive) {
        peek.style.display = 'none';
        name.style.display = 'block';
        el.classList.remove('active');
    } else {
        peek.style.display = 'block';
        name.style.display = 'none';
        el.classList.add('active');
    }
  },

  /* ================= ONLINE LOGIC ================= */

  renderHostSetup() {
    return `
      <div class="card">
        <div class="card-label">⚙️ Spiel-Optionen</div>
        <div style="display:flex; flex-direction:column; gap:15px;">
           <div style="display:flex; align-items:center; justify-content:space-between; background:var(--surface2); padding:15px; border-radius:12px; cursor:pointer;" onclick="document.getElementById('wo-own-toggle-on').click()">
              <div style="text-align:left;">
                <strong style="display:block; font-size:1.1rem;">Eigene Begriffe</strong>
                <small style="color:var(--text-muted);">Jeder denkt sich ein Wort für die anderen aus.</small>
              </div>
              <div class="toggle-switch">
                <input type="checkbox" id="wo-own-toggle-on" ${this.state.useOwnWords ? 'checked' : ''} onchange="WortOrakel.state.useOwnWords = this.checked; UnifiedLobby._updateHostLobby()">
                <span class="slider"></span>
              </div>
           </div>
        </div>
      </div>
      
      ${!this.state.useOwnWords ? `
      <div class="card">
        <div class="card-label">📦 Wort-Pakete</div>
        <div id="wo-pkg-grid"></div>
      </div>
      ` : ''}
    `;
  },

  onHostLobbyRendered() {
    if (!this.state.useOwnWords) this.renderPackages();
  },

  renderOnlineInput() {
    if (!this.state.useOwnWords && Multiplayer.role === 'host') {
        this.assignOnlinePackageWords();
        return;
    }
    
    if (!this.state.useOwnWords && Multiplayer.role === 'guest') {
        document.getElementById('play-content').innerHTML = `
            <div class="card" style="text-align:center; padding: 40px 10px;">
                <h3>⏳ Warte auf die Begriffe des Hosts...</h3>
            </div>
        `;
        return;
    }

    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 20px;">
        <h2 style="margin-bottom:10px;">Begriff wählen</h2>
        <p style="color:var(--text-muted); margin-bottom:30px;">Denk dir einen Begriff für jemand anderen aus!</p>
        
        <input type="text" id="wo-online-field" class="player-input" style="font-size:1.5rem; text-align:center; padding:15px; margin-bottom:20px;" placeholder="z.B. Sherlock Holmes">
        
        <button class="btn-primary" id="wo-submit-btn" onclick="WortOrakel.submitOnlineWord()">Bereit!</button>
      </div>
    `;
    setTimeout(() => document.getElementById('wo-online-field').focus(), 100);
  },

  submitOnlineWord() {
    const word = document.getElementById('wo-online-field').value.trim();
    if (!word) return;
    
    document.getElementById('wo-submit-btn').disabled = true;
    document.getElementById('wo-submit-btn').textContent = 'Gesendet...';

    if (Multiplayer.role === 'host') {
      this.state.words['host-1'] = word;
      this.checkAllWordsSubmitted();
    } else {
      Multiplayer.sendToHost({ type: 'submit_word', playerId: Multiplayer.myId, word: word });
    }
  },

  assignOnlinePackageWords() {
    let pool = [];
    WortOrakelPackages.forEach(pkg => {
        if (this.state.activePackageIds.includes(pkg.id)) {
            pool = pool.concat(pkg.tasks);
        }
    });
    this.shuffleArray(pool);
    
    this.state.assignedWords = {};
    const playerIds = this.state.players.map(p => p.id);
    playerIds.forEach((id, i) => {
      this.state.assignedWords[id] = pool[i % pool.length];
    });
    
    this.state.phase = 'play';
    this.broadcastState();
    this.renderHostGame();
  },

  checkAllWordsSubmitted() {
    const participantIds = this.state.players.map(p => p.id);
    const submittedIds = Object.keys(this.state.words);
    
    if (participantIds.every(id => submittedIds.includes(id))) {
      this.assignOnlineDerangement(participantIds);
      this.state.phase = 'play';
      this.broadcastState();
      this.renderHostGame();
    } else {
      this.renderHostWaiting();
    }
  },

  assignOnlineDerangement(playerIds) {
    const n = playerIds.length;
    let wordPool = playerIds.map(id => this.state.words[id]);
    
    let assigned = {};
    let attempts = 0;
    while(attempts < 100) {
      let shuffledPool = [...wordPool];
      this.shuffleArray(shuffledPool);
      
      let valid = true;
      for(let i=0; i<n; i++) {
        const myOriginalWord = this.state.words[playerIds[i]];
        if (shuffledPool[i] === myOriginalWord) {
          valid = false;
          break;
        }
      }
      
      if (valid) {
        for(let i=0; i<n; i++) assigned[playerIds[i]] = shuffledPool[i];
        break;
      }
      attempts++;
    }
    
    if (Object.keys(assigned).length === 0) {
        for(let i=0; i<n; i++) assigned[playerIds[i]] = wordPool[(i+1)%n];
    }
    
    this.state.assignedWords = assigned;
  },

  broadcastState() {
    Multiplayer.sendGameState({
      type: 'sync_phase',
      phase: this.state.phase,
      assignedWords: this.state.assignedWords,
      doneStatus: this.state.doneStatus,
      players: this.state.players.map(p => ({ id: p.id, name: p.name }))
    });
  },

  renderHostWaiting() {
    const participantIds = this.state.players.map(p => p.id);
    const submittedIds = Object.keys(this.state.words);
    
    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 10px;">
        <h3>⌛ Warte auf Begriffe...</h3>
        <p>${submittedIds.length} / ${participantIds.length} abgegeben</p>
      </div>
    `;
  },

  renderHostGame() {
    this.renderOnlineGame();
  },

  renderOnlineGame() {
    const myId = Multiplayer.role === 'host' ? 'host-1' : Multiplayer.myId;
    const isDone = this.state.doneStatus[myId];
    const myWord = this.state.assignedWords[myId];
    const myPlayer = this.state.players.find(p => p.id === myId);
    const myName = myPlayer ? myPlayer.name : 'Du';
    
    let ht = `
      <div class="card" style="text-align:center; padding: 20px;">
        <div class="card-label">🔥 Das Spiel läuft</div>
        
        <div style="background:var(--primary); color:#000; padding:20px; border-radius:15px; margin-bottom:20px;">
          <small style="opacity:0.7; font-weight:bold; text-transform:uppercase;">${myName}, wer bist du?</small>
          <div style="font-size:2rem; font-weight:bold;">???</div>
          ${isDone ? '<div style="background:#fff; padding:5px; border-radius:5px; margin-top:10px; font-weight:bold;">✅ ERRATEN!</div>' : `
            <button class="btn-primary" style="background:#000; color:#fff; width:auto; margin-top:15px;" onclick="WortOrakel.submitGuessed()">Wort erraten!</button>
          `}
        </div>

        <div class="card-label">Die anderen sind:</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          ${this.state.players.filter(p => p.id !== myId).map(p => `
            <div class="card" style="margin:0; padding:15px; text-align:left; border: 2px solid ${this.state.doneStatus[p.id] ? 'var(--green)' : 'transparent'}">
                <div style="font-size:0.7rem; color:var(--text-muted);">${p.name}</div>
                <div style="font-weight:bold; font-size:1.1rem;">${this.state.assignedWords[p.id]}</div>
                ${this.state.doneStatus[p.id] ? '<div style="color:var(--green); font-size:0.7rem; font-weight:bold;">FERTIG</div>' : ''}
            </div>
          `).join('')}
        </div>
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-primary" style="background:var(--surface2); color:var(--text);" onclick="WortOrakel.returnToLobby()">Lobby</button>
            ${Multiplayer.role === 'host' ? `<button class="btn-primary" onclick='WortOrakel.onOnlineGameStart({useOwnWords: ${this.state.useOwnWords}, activePackageIds: ${JSON.stringify(this.state.activePackageIds)}})'>Neustart</button>` : ''}
        </div>
      </div>
    `;
    
    document.getElementById('play-content').innerHTML = ht;
  },

  returnToLobby() {
    if (this.state.mode === 'offline') {
        this.open();
    } else {
        if (Multiplayer.role === 'host') {
            Multiplayer.sendGameState({ type: 'return_lobby' });
            UnifiedLobby._updateHostLobby();
        } else {
            UnifiedLobby._renderGuestLobby();
        }
    }
  },

  submitGuessed() {
    const myId = Multiplayer.role === 'host' ? 'host-1' : Multiplayer.myId;
    this.state.doneStatus[myId] = true;
    if (Multiplayer.role === 'host') {
      this.broadcastState();
      this.renderHostGame();
    } else {
      Multiplayer.sendToHost({ type: 'guessed_it', playerId: myId });
    }
  },

  /* ================= HELPERS ================= */
  shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
  }
};
</script>
</head>
<body>
<div class="screen active" id="screen-home">
  <div class="home-hero">
    <span class="home-logo">&#127918;</span>
    <h1 class="home-title">Party<br>Games</h1>
    <p class="home-sub">W&auml;hlt euer Spiel</p>
  </div>

  <p class="section-label">Verf&uuml;gbare Spiele</p>
  <div class="games-grid" id="games-grid">
    <!-- Wird durch JS bef&uuml;llt aus dem GAMES-Array -->
  </div>
</div>
<!-- =====================================================
     SETUP SCREEN
===================================================== -->

</div>

===================================================== -->

    <h2 class="screen-title" id="ul-title">Netzwerk Lobby</h2>

    <button class="btn-end" onclick="Router.go('home')">✕ Beenden</button>
  </div>
  <div id="play-content">
    <!-- Wird durch das aktive Spiel-Objekt befüllt -->
  </div>
</div>

<!-- =====================================================
     SPEKTRUM EMBED SCREEN
===================================================== -->
<div class="screen" id="screen-spektrum-embed">
  <div class="play-bar">
    <span class="play-game-name">Spektrum</span>
    <button class="btn-end" onclick="Router.go('home')">✕ Beenden</button>
  </div>
  <div style="max-width:560px; margin:12px auto 24px; height:min(860px, calc(100dvh - 108px)); border-radius:20px; overflow:hidden; background:rgba(31,36,54,0.55); border:1px solid rgba(255,255,255,0.06); box-shadow:0 14px 36px rgba(0,0,0,0.35);">
    <iframe id="spektrum-iframe" title="Spektrum" style="width:100%; height:100%; border:0; background:transparent;"></iframe>
  </div>
</div>
<script>
/* ===================================================
   MAIN APP - Core functionality only
   Games are loaded from separate modules
   =================================================== */

// Utility Functions
function setHTML(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
  return el;
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Alias for backwards compatibility
const shuffle = shuffleArr;

// Sample n random items from array
function sample(arr, n) {
  const shuffled = shuffleArr([...arr]);
  return shuffled.slice(0, n);
}

function restartAnimation(el) {
  if (!el) return;
  el.style.animation = 'none';
  el.offsetHeight; // trigger reflow
  const anim = el.dataset.anim || el.classList.contains('pop') ? 'pop' :
               el.classList.contains('slide') ? 'slide' : 'pop';
  el.style.animation = '';
}

// Router
const Router = {
  current: 'home',

  init() {
    try { history.replaceState({ screen: 'home' }, '', ''); } catch(e) {}
    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.screen) {
        this.go(e.state.screen, true);
      } else {
        this.go('home', true);
      }
    });
  },

  go(screenId, isPop = false) {
    if (!isPop && screenId !== this.current) {
      try { history.pushState({ screen: screenId }, '', ''); } catch(e) {}
    }

    if (screenId === 'home') {
      try {
        if (typeof Multiplayer !== 'undefined' && Multiplayer.disconnect) {
          Multiplayer.disconnect();
        }
      } catch (err) { console.error('Disconnect error', err); }
    }

    // Alten Screen ausblenden
    const old = document.getElementById(`screen-${this.current}`);
    if (old) old.classList.remove('active');

    // Neuen Screen einblenden + Animation neu starten
    const next = document.getElementById(`screen-${screenId}`);
    if (next) {
      next.classList.add('active');
      restartAnimation(next);
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    this.current = screenId;
  }
};

// Spektrum Embed
const SpektrumEmbed = {
  loaded: false,
  open() {
    Router.go('spektrum-embed');
    const iframe = document.getElementById('spektrum-iframe');
    if (!iframe) return;

    // Use srcdoc instead of src data: URL because data: URLs disable localStorage for security.
    if (typeof SPEKTRUM_DATA_URL !== 'undefined' && SPEKTRUM_DATA_URL.startsWith('data:')) {
      try {
        const base64 = SPEKTRUM_DATA_URL.split(',')[1];
        const html = decodeURIComponent(escape(atob(base64)));
        iframe.srcdoc = html;
      } catch (e) {
        console.error('Failed to decode Spektrum data:', e);
        iframe.src = SPEKTRUM_DATA_URL;
      }
    } else if (typeof SPEKTRUM_DATA_URL !== 'undefined') {
      iframe.src = SPEKTRUM_DATA_URL;
    }
    
    this.loaded = true;
  }
};

// Initialize app when DOM is ready
function initApp() {
  Router.init();
  const grid = document.getElementById('games-grid');
  if (!grid) {
    console.error('games-grid not found!');
    return;
  }

  // Spielkarten aus GAMES-Array generieren
  grid.innerHTML = GAMES.map(game => `
    <button
      class="game-card"
      style="
        --gc-color:  ${game.color};
        --gc-shadow: ${game.shadow};
        --gc-glow:   ${game.glow};
      "
      onclick="GAMES.find(g => g.id === '${game.id}').open()"
    >
      <span class="gc-icon">${game.emoji}</span>
      <div class="gc-info">
        <div class="gc-name">${game.name}</div>
        <div class="gc-tagline">${game.tagline}</div>
      </div>
      <span class="gc-arrow">&rarr;</span>
    </button>
  `).join('');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
</body>
</html>
