            <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:15px;">
                <div style="display:flex; gap:10px; align-items: stretch;">
                    <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin:0; width: 60px; font-size: 1.5rem;" onclick="GrenzGaenger.offlineAction('bid', ${s.currentBid + 1})">+1</button>
                    <input type="number" id="lz-custom-bid" class="player-input" style="flex:1; text-align:center; font-size:1.3rem;" value="${s.currentBid + 1}" min="${s.currentBid + 1}" step="1">
                    <button class="btn-primary" style="width:100px; margin:0; padding:0 20px;" onclick="GrenzGaenger.offlineAction('bid', parseInt(document.getElementById('lz-custom-bid').value))">BIETEN</button>
                </div>
            </div>
            ${s.currentBid > 0 ? `<button class="btn-primary" style="background:var(--primary); color:#fff; border-radius:20px; font-size:0.9rem; padding:12px; margin-top:10px;" onclick="GrenzGaenger.offlineAction('challenge')">🚫 Das schafft er nie!</button>` : ''}
        ` : ''}

        ${s.phase === 'challenge' ? `
            <div style="background:var(--bg); color:var(--primary); border: 2px solid var(--primary); padding:20px; border-radius:15px; margin-bottom:25px;">
                <b style="font-size:1.2rem; text-transform:uppercase; letter-spacing:0.1em;">CHALLENGE!</b><br>
                <span style="font-size:1.1rem; color:var(--text); display:block; margin-top:10px;"><b>${s.players[s.lastBidderIdx]}</b> muss nun <b>${s.currentBid}</b> Dinge nennen.</span>
            </div>
            <p style="margin-bottom:15px; font-weight:bold;">Hat er es geschafft?</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" style="background:var(--green); color:#000; margin:0;" onclick="GrenzGaenger.offlineAction('resolve', true)">✅ JA!</button>
                <button class="btn-primary" style="background:var(--primary); color:#fff; margin:0;" onclick="GrenzGaenger.offlineAction('resolve', false)">❌ NEIN!</button>
            </div>
        ` : ''}
      </div>

      <div class="card-label" style="margin-top:25px; margin-bottom:10px;">Punktestand:</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${s.players.map((name, i) => `
            <div style="background:var(--surface); border:1px solid var(--border); padding:8px 14px; border-radius:12px; font-size:0.85rem;">
                ${name}: <b style="color:var(--secondary)">${s.scores[i]}</b>
            </div>
        `).join('')}
      </div>
      <div style="margin-top:20px;">
      </div>
    `;
    document.getElementById('play-content').innerHTML = ht;
  },

  offlineAction(type, val) {
    const s = this.state;
    if (type === 'bid') {
        if (isNaN(val) || val <= s.currentBid) return alert("Du musst höher bieten!");
        s.lastBidderIdx = s.currentBidderIdx;
        s.currentBid = val;
        s.currentBidderIdx = (s.currentBidderIdx + 1) % s.players.length;
    } else if (type === 'challenge') {
        s.challengerIdx = s.currentBidderIdx;
        s.phase = 'challenge';
    } else if (type === 'resolve') {
        this.resolveRound(val);
        return;
    }
    this.renderOfflineGame();
  },

  resolveRound(success) {
    const s = this.state;
    const performerIdx = this.state.mode === 'online' ? this.state.players[s.lastBidderIdx].id : s.lastBidderIdx;
    
    if (success) {
        s.scores[performerIdx]++;
    } else {
        // Everyone except performer gets a point
        if (this.state.mode === 'online') {
            s.players.forEach(p => {
                if (p.id !== performerIdx) s.scores[p.id]++;
            });
        } else {
            s.players.forEach((_, i) => {
                if (i !== performerIdx) s.scores[i]++;
            });
        }
    }

    if (s.currentRound >= s.maxRounds) {
        s.phase = 'results';
        this.renderResults();
    } else {
        s.currentRound++;
        if (this.state.mode === 'online') {
            this.startNewOnlineRound();
        } else {
            this.startNewOfflineRound();
        }
    }
  },

  renderResults() {
    const s = this.state;
    let winners = [];
    let maxScore = -1;
    
    if (this.state.mode === 'online') {
        s.players.forEach(p => {
            if (s.scores[p.id] > maxScore) {
                maxScore = s.scores[p.id];
                winners = [p.name];
            } else if (s.scores[p.id] === maxScore) {
                winners.push(p.name);
            }
        });
    } else {
        s.players.forEach((name, i) => {
            if (s.scores[i] > maxScore) {
                maxScore = s.scores[i];
                winners = [name];
            } else if (s.scores[i] === maxScore) {
                winners.push(name);
            }
        });
    }
    this.state.phase = 'results';

    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding:50px 20px;">
        <h1 style="font-size:3.5rem; margin-bottom:10px; font-family:'Abril Fatface', cursive;">🏆 Sieg!</h1>
        <h2 style="color:var(--primary); margin-bottom:40px; font-size:2rem;">${winners.join(' & ')}</h2>
        
        <div class="card-label">Finale Punkte</div>
        <div style="background:var(--surface2); padding:20px; border-radius:15px; margin-bottom:40px;">
            ${(this.state.mode === 'online' ? s.players.map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${p.name}</span>
                    <b style="color:var(--secondary)">${s.scores[p.id]} Pkt.</b>
                </div>
            `) : s.players.map((name, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${name}</span>
                    <b style="color:var(--secondary)">${s.scores[i]} Pkt.</b>
                </div>
            `)).join('')}
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          ${this.state.mode === 'offline' || Multiplayer.role === 'host' ? `<button class="btn-primary" onclick="GrenzGaenger.rematch()">Nochmal spielen</button>` : ''}
          <button class="btn-primary" style="background:var(--surface2); color:var(--text);" onclick="GrenzGaenger.open()">Hauptmenü</button>
          ${this.state.mode === 'online' ? `<button class="btn-primary" style="background:var(--surface2); color:var(--text);" onclick="GrenzGaenger.returnToLobby()">Lobby</button>` : ''}
        </div>
      </div>
    `;

    if (this.state.mode === 'online' && Multiplayer.role === 'host') {
        this.broadcastState();
    }
  },

  /* ================= ONLINE SPECIFIC ================= */

  renderHostSetup() {
    return `
      <div class="card">
        <div class="card-label">📦 Kategorien</div>
        <div id="lz-pkg-grid-on"></div>
      </div>
      <div class="card">
        <div class="card-label">⏱️ Rundenanzahl</div>
        <div style="display:flex; align-items:center; gap:10px;">
           <input type="range" class="styled-range" min="1" max="21" step="1" value="${this.state.maxRounds > 20 ? 21 : this.state.maxRounds}" 
             style="--pct: ${(( (this.state.maxRounds > 20 ? 21 : this.state.maxRounds) - 1) / (21 - 1)) * 100}%"
             oninput="
               const val = parseInt(this.value);
               document.getElementById('lz-rounds-val-on').textContent = val > 20 ? 'Endlos' : val; 
               GrenzGaenger.state.maxRounds = val > 20 ? 999 : val;
               this.style.setProperty('--pct', ((val - this.min) / (this.max - this.min)) * 100 + '%');
             ">
           <span id="lz-rounds-val-on" style="font-weight:bold; width: 60px; text-align:right;">${this.state.maxRounds > 20 ? 'Endlos' : this.state.maxRounds}</span>
        </div>
      </div>
    `;
  },

  onHostLobbyRendered() {
    this.renderPackages();
  },

  broadcastState() {
    Multiplayer.sendGameState({
        type: 'sync_state',
        state: {
            phase: this.state.phase,
            currentQuestion: this.state.currentQuestion,
            currentBid: this.state.currentBid,
            currentBidderIdx: this.state.currentBidderIdx,
            lastBidderIdx: this.state.lastBidderIdx,
            challengerIdx: this.state.challengerIdx,
            scores: this.state.scores,
            currentRound: this.state.currentRound,
            players: this.state.players.map(p => ({ id: p.id, name: p.name })),
            activePackageIds: this.state.activePackageIds
        }
    });
  },

  renderOnlineGame() {
    const s = this.state;
    if (s.phase === 'results') return this.renderResults();

    const myId = Multiplayer.role === 'host' ? 'host-1' : Multiplayer.myId;
    const isMyTurn = s.players[s.currentBidderIdx].id === myId;
    const currName = isMyTurn ? 'DU' : s.players[s.currentBidderIdx].name;
    const lastName = s.lastBidderIdx !== -1 ? s.players[s.lastBidderIdx].name : '-';
    const isChallenger = s.challengerIdx !== -1 && s.players[s.challengerIdx].id === myId;
    
    let ht = `
      <div style="font-size:0.75rem; background:var(--surface2); padding:4px 10px; border-radius:10px; margin-bottom:8px; display:inline-block;">
        Runde <b>${s.currentRound}</b> ${s.maxRounds > 20 ? '' : ` / ${s.maxRounds}`}
      </div>

      <div class="card" style="text-align:center; padding: 15px; margin-bottom:12px;">
        <h2 style="margin-bottom:12px; font-size:1.2rem; line-height:1.3;">${s.currentQuestion}</h2>
        <div style="font-size:3rem; font-weight:bold; color:var(--primary); line-height:1;">${s.currentBid}</div>
        <p style="color:var(--text-muted); font-size:0.8rem; margin-top:4px;">Gebot von: <b style="color:var(--text)">${lastName}</b> ${s.lastBidderIdx !== -1 && s.players[s.lastBidderIdx].id === myId ? '(DIR)' : ''}</p>
        ${s.maxRounds > 20 && Multiplayer.role === 'host' ? `<button class="btn-primary" style="background:var(--primary); color:#fff; font-size:0.8rem; margin-top:10px; padding:5px 10px; width:auto;" onclick="GrenzGaenger.renderResults()">Spiel beenden</button>` : ''}
      </div>

      <div class="card" style="text-align:center; padding: 18px; border: 2px solid ${isMyTurn ? 'var(--primary)' : 'transparent'}; background: ${isMyTurn ? 'var(--primary-dim)' : 'var(--surface)'}; margin-bottom:12px;">
        <div class="card-label" style="font-size:0.7rem;">Am Zug</div>
        <h3 style="font-size:1.4rem; margin-bottom:15px;">${currName}</h3>
        
        ${s.phase === 'bidding' ? (
            isMyTurn ? `
                 <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:10px;">
                    <div style="display:flex; gap:10px; align-items: stretch;">
                        <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin:0; width: 60px; font-size: 1.5rem;" onclick="GrenzGaenger.onlineAction('bid', ${s.currentBid + 1})">+1</button>
                        <input type="number" id="lz-custom-bid-on" class="player-input" style="flex:1; text-align:center; font-size:1.3rem;" value="${s.currentBid + 1}" min="${s.currentBid + 1}" step="1">
                        <button class="btn-primary" style="width:100px; margin:0; padding:0 20px;" onclick="GrenzGaenger.onlineAction('bid', parseInt(document.getElementById('lz-custom-bid-on').value))">BIETEN</button>
                    </div>
                </div>
                ${s.currentBid > 0 ? `<button class="btn-primary" style="background:var(--primary); color:#fff; border-radius:20px; font-size:0.9rem; padding:12px; margin-top:10px;" onclick="GrenzGaenger.onlineAction('challenge')">🚫 Das schafft er nie!</button>` : ''}
            ` : `<p style="color:var(--text-muted);">Warte darauf, dass <b>${currName}</b> bietet...</p>`
        ) : ''}

        ${s.phase === 'challenge' ? `
            <div style="background:var(--bg); color:var(--primary); border: 2px solid var(--primary); padding:20px; border-radius:15px; margin-bottom:25px;">
                <b style="font-size:1.2rem; text-transform:uppercase; letter-spacing:0.1em;">CHALLENGE!</b><br>
                <span style="font-size:1.1rem; color:var(--text); display:block; margin-top:10px;"><b>${s.players[s.lastBidderIdx].name}</b> muss nun <b>${s.currentBid}</b> Dinge nennen.</span>
            </div>
            ${isChallenger ? `
                <p style="margin-bottom:15px; font-weight:bold;">Hat er es geschafft?</p>
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" style="background:var(--green); color:#000; margin:0;" onclick="GrenzGaenger.onlineAction('resolve', true)">✅ JA!</button>
                    <button class="btn-primary" style="background:var(--primary); color:#fff; margin:0;" onclick="GrenzGaenger.onlineAction('resolve', false)">❌ NEIN!</button>
                </div>
            ` : `<p style="color:var(--text-muted);">Warte auf Bestätigung von <b>${s.players[s.challengerIdx].name}</b>...</p>`}
        ` : ''}
      </div>

      <div class="card-label" style="margin-top:25px; margin-bottom:10px;">Punktestand:</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${s.players.map(p => `
            <div style="background:var(--surface); border: 1px solid ${p.id === myId ? 'var(--primary)' : 'var(--border)'}; padding:8px 14px; border-radius:12px; font-size:0.85rem;">
                ${p.name}: <b style="color:var(--secondary)">${s.scores[p.id]}</b>
            </div>
        `).join('')}
      </div>
      <div style="margin-top:20px;">
      </div>
    `;
    document.getElementById('play-content').innerHTML = ht;
  },

  onlineAction(type, val = null) {
    if (type === 'bid' && (isNaN(val) || val <= this.state.currentBid)) return alert("Du musst höher bieten!");
    
    if (Multiplayer.role === 'host') {
        this.handleOnlineData({ type, value: val, success: val, playerId: 'host-1' }, null);
    } else {
        Multiplayer.sendToHost({ type, value: val, success: val, playerId: Multiplayer.myId });
    }
  },

  returnToLobby() {
    if (this.state.mode === 'offline') {
        this.open();
    } else {
        if (Multiplayer.role === 'host') {
            Multiplayer.sendGameState({ type: 'return_lobby' });
            UnifiedLobby._updateHostLobby();
        } else {
            UnifiedLobby._renderGuestLobby();
        }
    }
  },

  rematch() {
      if (this.state.mode === 'online') {
          this.onOnlineGameStart(this.collectOnlineSettings());
      } else {
          this.startOfflineGame();
      }
  }
};
</script>
<script>
/* === kissmarrykill.js === */
/* ===================================================
   Kiss Marry Kill - Logik (Off- und Online)
   Nutzt UnifiedLobby v2 für Online-Modus
=================================================== */

const KmkGame = {
  name: 'Kiss Marry Kill',
  state: {
    mode: 'offline',
    activePackages: ['Cartoon', 'Celebrities'],
    currentImages: [],
    usedImages: [],
    myAnswers: [null, null, null],

    // Online & Logic
    players: [],
    myName: '',
    round: 0,
    maxRounds: 5,
    roundTime: 30,
    resultViewMode: 'podium', // 'podium' or 'segmented'
    timeLeft: 30,
    timerInterval: null,
    submissions: 0,
    roundData: [],
    rankings: [],
    totalPlayers: 0,
    isLocked: false
  },

  /* =================================================
     MODUS-AUSWAHL
  ================================================= */
  openModeSelection() {
    this.stopTimer();
    Router.go('play');
    document.getElementById('play-game-name').textContent = 'Kiss Marry Kill 💋🔪💍';

    setHTML('play-content', `
      <div class="kmk-mode-container">
        <h2 style="text-align:center; color:#fff;">Wie willst du spielen?</h2>
        <div class="kmk-mode-btn" onclick="KmkGame.startOfflineSetup()">
          🏠 Offline spielen
          <div class="kmk-mode-desc">An einem Gerät gemeinsam diskutieren & entscheiden.</div>
        </div>
        <div class="kmk-mode-btn" onclick="UnifiedLobby.open(KmkGame)">
          🌍 Online spielen
          <div class="kmk-mode-desc">Jeder wählt heimlich, dann Gruppen-Ranking!</div>
        </div>
      </div>
    `);
  },

  /* =================================================
     OFFLINE SETUP
  ================================================= */
  startOfflineSetup() {
    this.state.mode = 'offline';
    Router.go('setup');
    document.getElementById('setup-title').textContent = 'Kiss Marry Kill - Setup';

    setHTML('setup-content', `
      <div class="card">
        <div class="card-label">📦 Wähle deine Pakete</div>
        <div class="packages-grid" id="kmk-packages-grid"></div>
      </div>
      <div id="kmk-setup-warn"></div>
      <button class="btn-primary" id="start-btn" onclick="KmkGame.startOfflineGame()">
        🚀 Spiel starten
      </button>
    `);
    this.renderPackages();
  },

  /* =================================================
     ONLINE LOBBY HOOKS (für UnifiedLobby v2)
  ================================================= */

  renderHostSetup() {
    return `
      <div class="card">
        <div class="card-label">📦 Wähle deine Pakete</div>
        <div class="packages-grid" id="kmk-packages-grid"></div>
      </div>
      <div class="card">
        <div class="card-label">📊 Auswertungs-Stil</div>
        <div class="packages-grid">
          <div class="pkg-card ${this.state.resultViewMode === 'podium' ? 'active' : ''}" 
            onclick="KmkGame.state.resultViewMode = 'podium'; UnifiedLobby._updateHostLobby();">
            <span class="pkg-check">✓</span>
            <div class="pkg-emoji">🏆</div>
            <div class="pkg-name">Community Urteil</div>
            <div class="pkg-count">Podest-Platzierung</div>
          </div>
          <div class="pkg-card ${this.state.resultViewMode === 'segmented' ? 'active' : ''}" 
            onclick="KmkGame.state.resultViewMode = 'segmented'; UnifiedLobby._updateHostLobby();">
            <span class="pkg-check">✓</span>
            <div class="pkg-emoji">📈</div>
            <div class="pkg-name">Detail Analyse</div>
            <div class="pkg-count">Prozentuale Verteilung</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-label">🔄 Rundenanzahl</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="range" class="styled-range" min="1" max="21" step="1" value="${this.state.maxRounds > 20 ? 21 : this.state.maxRounds}"
            style="--pct: ${(( (this.state.maxRounds > 20 ? 21 : this.state.maxRounds) - 1) / (21 - 1)) * 100}%"
            oninput="
              const val = parseInt(this.value);
              document.getElementById('kmk-rounds-val').textContent = val > 20 ? 'Endlos' : val;
              KmkGame.state.maxRounds = val > 20 ? 999 : val;
              this.style.setProperty('--pct', ((val - this.min) / (this.max - this.min)) * 100 + '%');
            ">
          <span id="kmk-rounds-val" style="font-weight:bold; width: 60px; text-align:right;">${this.state.maxRounds > 20 ? 'Endlos' : this.state.maxRounds}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-label">⏱️ Abstimmzeit pro Runde (Sekunden)</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="range" class="styled-range" min="5" max="120" step="5" value="${this.state.roundTime}"
            style="--pct: ${((this.state.roundTime - 5) / (120 - 5)) * 100}%"
            oninput="
              document.getElementById('kmk-timer-val').textContent = this.value + 's';
              KmkGame.state.roundTime = parseInt(this.value);
              this.style.setProperty('--pct', ((this.value - this.min) / (this.max - this.min)) * 100 + '%');
            ">
          <span id="kmk-timer-val" style="font-weight:bold; width: 50px; text-align:right;">${this.state.roundTime}s</span>
        </div>
      </div>
    `;
  },

  onHostLobbyRendered() {
    this.renderPackages();
  },

  collectOnlineSettings() {
    return {
      activePackages: [...this.state.activePackages],
      roundTime: this.state.roundTime,
      maxRounds: this.state.maxRounds,
      resultViewMode: this.state.resultViewMode
    };
  },

  onOnlineGameStart(settings) {
    this.state.mode = 'online';
    this.state.activePackages = settings.activePackages || ['Cartoon', 'Celebrities'];
    this.state.roundTime = settings.roundTime || 30;
    this.state.maxRounds = settings.maxRounds || 5;
    this.state.resultViewMode = settings.resultViewMode || 'podium';
    this.state.round = 0;
    this.state.usedImages = [];

    document.getElementById('play-game-name').textContent = 'Kiss Marry Kill 💋🔪💍';
    Router.go('play');

    if (Multiplayer.role === 'host') {
      this._nextOnlineRoundHost();
    } else {
      setHTML('play-content', `
        <div class="card" style="text-align:center; padding:40px;">
          <h3>⏳ Warte auf den Host...</h3>
          <p class="muted">Gleich geht's los!</p>
        </div>
      `);
    }
  },

  handleOnlineData(data, conn) {
    if (Multiplayer.role === 'host') {
      if (data.type === 'kmk_vote') {
        this.state.submissions = (this.state.submissions || 0) + 1;
        this.state.roundData.push(data.answers);
        const statusEl = document.getElementById('kmk-online-status');
        if (statusEl) statusEl.textContent = `Warte auf Spieler... (${this.state.submissions}/${this.state.totalPlayers})`;
        if (this.state.submissions >= this.state.totalPlayers) {
          this._evaluateAndBroadcast();
        }
      }
    } else {
      if (data.type === 'kmk_turn') {
        this.state.currentImages = data.images;
        this.state.round = data.round;
        this.state.maxRounds = data.maxRounds || 5;
        this.state.myAnswers = [null, null, null];
        this.state.roundTime = data.roundTime || 30;
        this.state.isLocked = false;
        this.renderPlayArea();
        this.startTimer();
      } else if (data.type === 'kmk_results') {
        this.stopTimer();
        this.state.rankings = data.rankings;
        this._showResultBars();
      } else if (data.type === 'kmk_end') {
        this.renderGameOver();
      }
    }
  },

  /* =================================================
     TIMER LOGIC
  ================================================= */
  startTimer() {
    this.stopTimer();
    this.state.timeLeft = this.state.roundTime;
    const updateUI = () => {
      const bar = document.getElementById('kmk-timer-bar');
      const text = document.getElementById('kmk-timer-text');
      if (bar) bar.style.width = (this.state.timeLeft / this.state.roundTime) * 100 + '%';
      if (text) text.textContent = Math.ceil(this.state.timeLeft) + 's';
    };
    updateUI();

    this.state.timerInterval = setInterval(() => {
      this.state.timeLeft -= 1;
      updateUI();
      if (this.state.timeLeft <= 0) {
        this.stopTimer();
        if (!this.state.isLocked) this._lockOnlineAnswers();
      }
    }, 1000);
  },

  stopTimer() {
    if (this.state.timerInterval) clearInterval(this.state.timerInterval);
    this.state.timerInterval = null;
  },

  /* =================================================
     LOGIC & UI
  ================================================= */
  renderPackages() {
    const pkgGrid = document.getElementById('kmk-packages-grid');
    if (!pkgGrid) return;
    const available = ['Cartoon', 'Celebrities'];
    let html = '';
    available.forEach(pkg => {
      const isActive = this.state.activePackages.includes(pkg);
      let count = (typeof KMK_DATA !== 'undefined' && KMK_DATA[pkg]) ? KMK_DATA[pkg].length : 0;
      html += `
        <div class="pkg-card ${isActive ? 'active' : ''}" onclick="KmkGame.togglePackage('${pkg}')">
          <span class="pkg-check">✓</span>
          <div class="pkg-emoji">${pkg === 'Cartoon' ? '🧜‍♀️' : '🌟'}</div>
          <div class="pkg-name">${pkg}</div>
          <div class="pkg-count">${count} Bilder</div>
        </div>
      `;
    });
    setHTML('kmk-packages-grid', html);
    const btn = document.getElementById('start-btn');
    if (btn) btn.disabled = this.state.activePackages.length === 0;
  },

  togglePackage(pkg) {
    const idx = this.state.activePackages.indexOf(pkg);
    if (idx > -1) {
      if (this.state.activePackages.length > 1) this.state.activePackages.splice(idx, 1);
    } else {
      this.state.activePackages.push(pkg);
    }
    this.renderPackages();
  },

  startOfflineGame() {
    Router.go('play');
    document.getElementById('play-game-name').textContent = 'Kiss Marry Kill 💋🔪💍';
    this.nextOfflineRound();
  },

  generateRandomImages() {
    if (typeof KMK_DATA === 'undefined') return null;
    let pool = [];
    this.state.activePackages.forEach(pkg => {
      if (KMK_DATA[pkg]) KMK_DATA[pkg].forEach(f => pool.push({ category: pkg, file: f }));
    });
    if (pool.length < 3) return null;
    let availablePool = pool.filter(item => !this.state.usedImages.includes(item.category + '/' + item.file));
    if (availablePool.length < 3) {
      this.state.usedImages = [];
      availablePool = pool;
    }
    let selected = [];
    for (let i = 0; i < 3; i++) {
      let rIndex = Math.floor(Math.random() * availablePool.length);
      selected.push(availablePool[rIndex]);
      this.state.usedImages.push(availablePool[rIndex].category + '/' + availablePool[rIndex].file);
      availablePool.splice(rIndex, 1);
    }
    return selected;
  },

  nextOfflineRound() {
    const imgs = this.generateRandomImages();
    if (!imgs) return setHTML('play-content', '<div style="color:white; text-align:center;">Nicht genug Bilder verfügbar!</div>');
    this.state.currentImages = imgs;
    this.state.myAnswers = [null, null, null];
    this.renderPlayArea();
  },

  _nextOnlineRoundHost() {
    if (Multiplayer.role !== 'host') return;
    if (this.state.round >= this.state.maxRounds) {
      this.broadcastEnd();
      this.renderGameOver();
      return;
    }
    this.state.round++;
    this.state.submissions = 0;
    this.state.roundData = [];
    this.state.totalPlayers = this.state.players.length;
    this.state.isLocked = false;
    const imgs = this.generateRandomImages();
    if (!imgs) return alert('Fehler: Keine Bilder verfügbar!');
    this.state.currentImages = imgs;
    Multiplayer.sendGameState({
      type: 'kmk_turn',
      images: imgs,
      round: this.state.round,
      maxRounds: this.state.maxRounds,
      roundTime: this.state.roundTime
    });
    this.state.myAnswers = [null, null, null];
    this.renderPlayArea();
    this.startTimer();
  },

  formatName(filename) {
    return filename
      .replace(/\.webp|\.png|\.jpg|\.jpeg/gi, '')
      .replace(/_/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  },

  renderPlayArea() {
    const images = this.state.currentImages;
    let html = '';

    if (this.state.mode === 'online') {
      html += `
        <div class="kmk-timer-text" id="kmk-timer-text">${this.state.roundTime}s</div>
        <div class="kmk-timer-container"><div class="kmk-timer-bar" id="kmk-timer-bar"></div></div>
        <div style="text-align:center; color:var(--text-muted); margin-bottom:15px; font-weight:bold;">
          Runde ${this.state.round} ${this.state.maxRounds > 20 ? '' : `von ${this.state.maxRounds}`}
        </div>
      `;
    }

    html += '<div class="kmk-play-container">';
    images.forEach((imgObj, i) => {
      let pathStr = '../Pictures/' + imgObj.category + '/' + imgObj.file;
      let nameStr = this.formatName(imgObj.file);
      html += `
        <div class="kmk-card">
          <div class="kmk-name">${nameStr}</div>
          <div class="kmk-image-wrapper">
             <img src="${pathStr}" class="kmk-image-blur-bg" />
             <img src="${pathStr}" class="kmk-image" alt="${nameStr}" />
          </div>
          <div class="kmk-actions" id="kmk-actions-${i}">
            <button class="kmk-btn btn-kiss" onclick="KmkGame.setChoice(${i}, 'kiss')">💋</button>
            <button class="kmk-btn btn-marry" onclick="KmkGame.setChoice(${i}, 'marry')">💍</button>
            <button class="kmk-btn btn-kill" onclick="KmkGame.setChoice(${i}, 'kill')">🔪</button>
          </div>
          <div id="kmk-results-${i}" class="kmk-results" style="display:none;"></div>
        </div>
      `;
    });
    html += '</div><div id="kmk-next-wrapper" style="text-align:center; margin-top:20px;"></div>';
    setHTML('play-content', html);
    this.updateButtons();
  },

  setChoice(personIndex, choiceStr) {
    if (this.state.isLocked) return;
    for (let i = 0; i < 3; i++) {
        if (this.state.myAnswers[i] === choiceStr && i !== personIndex) this.state.myAnswers[i] = null;
    }
    if (this.state.myAnswers[personIndex] === choiceStr) this.state.myAnswers[personIndex] = null;
    else this.state.myAnswers[personIndex] = choiceStr;
    this.updateButtons();
  },

  updateButtons() {
    let allAssigned = true;
    for (let i = 0; i < 3; i++) {
      let selected = this.state.myAnswers[i];
      if (!selected) allAssigned = false;
      let btns = document.getElementById('kmk-actions-' + i);
      if (!btns) continue;
      let btnK = btns.querySelector('.btn-kiss');
      let btnM = btns.querySelector('.btn-marry');
      let btnL = btns.querySelector('.btn-kill');
      btnK.className = 'kmk-btn btn-kiss' + (selected === 'kiss' ? ' active-kiss' : (this.state.myAnswers.includes('kiss') ? ' taken' : ''));
      btnM.className = 'kmk-btn btn-marry' + (selected === 'marry' ? ' active-marry' : (this.state.myAnswers.includes('marry') ? ' taken' : ''));
      btnL.className = 'kmk-btn btn-kill' + (selected === 'kill' ? ' active-kill' : (this.state.myAnswers.includes('kill') ? ' taken' : ''));
    }
    if (allAssigned) {
      if (this.state.mode === 'offline') {
        setHTML('kmk-next-wrapper', '<button class="btn-next" style="width: 200px;" onclick="KmkGame.nextOfflineRound()">Nächste Runde ➡️</button>');
      } else if (!this.state.isLocked) {
        setHTML('kmk-next-wrapper', '<button class="btn-next" style="width: 200px;" onclick="KmkGame._lockOnlineAnswers()">Antworten absenden 🚀</button>');
      }
    } else {
      setHTML('kmk-next-wrapper', '');
    }
  },

  _lockOnlineAnswers() {
    this.state.isLocked = true;
    this.stopTimer();
    const ansMap = { 0: this.state.myAnswers[0], 1: this.state.myAnswers[1], 2: this.state.myAnswers[2] };
    for (let i = 0; i < 3; i++) {
      var el = document.getElementById('kmk-actions-' + i);
      if (el) { el.style.pointerEvents = 'none'; el.style.opacity = '0.5'; }
    }
    setHTML('kmk-next-wrapper', '<div style="font-weight:bold; color:var(--primary);" id="kmk-online-status">Warte auf andere Spieler...</div>');
    if (Multiplayer.role === 'host') {
      this.state.submissions = (this.state.submissions || 0) + 1;
      this.state.roundData.push(ansMap);
      const statusEl = document.getElementById('kmk-online-status');
      if (statusEl) statusEl.textContent = `Warte auf Spieler... (${this.state.submissions}/${this.state.totalPlayers})`;
      if (this.state.submissions >= this.state.totalPlayers) this._evaluateAndBroadcast();
    } else {
      Multiplayer.sendToHost({ type: 'kmk_vote', answers: ansMap });
    }
  },

  _evaluateAndBroadcast() {
    const total = this.state.roundData.length;
    let rankings = [];
    for (let i = 0; i < 3; i++) {
      let counts = { kiss: 0, marry: 0, kill: 0 };
      this.state.roundData.forEach(ans => { if (ans[i]) counts[ans[i]]++; });
      rankings.push({
        kiss: Math.round((counts.kiss / total) * 100) || 0,
        marry: Math.round((counts.marry / total) * 100) || 0,
        kill: Math.round((counts.kill / total) * 100) || 0
      });
    }
    this.state.rankings = rankings;
    Multiplayer.sendGameState({ type: 'kmk_results', rankings: rankings });
    this._showResultBars();
  },

  _showResultBars() {
    this.stopTimer();
    const rankings = this.state.rankings;
    const images = this.state.currentImages;

    let html = `
      <div style="text-align:center; margin-bottom: 20px;">
        <div style="font-weight:bold; color:var(--text-muted); margin-bottom: 5px;">Runde ${this.state.round} ${this.state.maxRounds > 20 ? '' : `von ${this.state.maxRounds}`}</div>
        <h2 style="color:var(--primary); font-size: 2rem;">Das Community-Urteil</h2>
      </div>
      <div class="kmk-podium-container">
    `;

    if (this.state.resultViewMode === 'segmented') {
      // MODE 2: SEGMENTED BARS (Specific Analysis)
      images.forEach((imgObj, i) => {
        const pathStr = '../Pictures/' + imgObj.category + '/' + imgObj.file;
        const nameStr = this.formatName(imgObj.file);
        const data = rankings[i];
        
        html += `
          <div class="kmk-podium-slot">
            <div class="kmk-podium-winner-name">${nameStr}</div>
            <div class="kmk-podium-winner-pct">Einzelauswertung</div>
            <div class="kmk-podium-winner-img-wrapper">
               <img src="${pathStr}" class="kmk-podium-winner-img" />
            </div>
            <div class="kmk-segmented-bar">
               <div class="kmk-segment marry" style="height: ${data.marry}%">${data.marry > 15 ? '💍 ' + data.marry + '%' : ''}</div>
               <div class="kmk-segment kiss" style="height: ${data.kiss}%">${data.kiss > 15 ? '💋 ' + data.kiss + '%' : ''}</div>
               <div class="kmk-segment kill" style="height: ${data.kill}%">${data.kill > 15 ? '🔪 ' + data.kill + '%' : ''}</div>
            </div>
          </div>
        `;
      });
    } else {
      // MODE 1: PODIUM (Winner Priority)
      let availableIndices = [0, 1, 2];
      let winners = { marry: -1, kiss: -1, kill: -1 };
      winners.marry = availableIndices.reduce((prev, curr) => rankings[curr].marry > rankings[prev].marry ? curr : prev);
      availableIndices = availableIndices.filter(i => i !== winners.marry);
      winners.kiss = availableIndices.reduce((prev, curr) => rankings[curr].kiss > rankings[prev].kiss ? curr : prev);
      availableIndices = availableIndices.filter(i => i !== winners.kiss);
      winners.kill = availableIndices[0];

      const getWinnerHTML = (idx, type, label, emoji) => {
        const imgObj = images[idx];
        const pathStr = '../Pictures/' + imgObj.category + '/' + imgObj.file;
        const nameStr = this.formatName(imgObj.file);
        const pct = rankings[idx][type];
        return `
          <div class="kmk-podium-slot ${type}">
            <div class="kmk-podium-winner-name">${nameStr}</div>
            <div class="kmk-podium-winner-pct">${pct}% Zustimmung</div>
            <div class="kmk-podium-winner-img-wrapper">
               <img src="${pathStr}" class="kmk-podium-winner-img" />
            </div>
            <div class="kmk-podium-bar">
              <span class="kmk-podium-label">${label}</span>
              <span class="kmk-podium-emoji">${emoji}</span>
            </div>
          </div>
        `;
      };
      html += getWinnerHTML(winners.kiss, 'kiss', 'Kiss', '💋');
      html += getWinnerHTML(winners.marry, 'marry', 'Marry', '💍');
      html += getWinnerHTML(winners.kill, 'kill', 'Kill', '🔪');
    }

    html += `</div><div id="kmk-podium-actions" style="text-align:center; margin-top:30px;">`;

    if (Multiplayer.role === 'host') {
      const isEnd = this.state.round >= this.state.maxRounds;
      const btnText = isEnd ? 'Finales Ergebnis 📊' : 'Nächste Runde starten ➡️';
      html += `<button class="btn-next" style="width: 280px; margin-bottom:10px;" onclick="KmkGame._nextOnlineRoundHost()">${btnText}</button>`;
      if (this.state.maxRounds > 20) {
        html += `<br><button class="btn-secondary" style="width: 280px; border-color:var(--danger); color:var(--danger);" onclick="KmkGame.broadcastEnd(); KmkGame.renderGameOver();">Spiel beenden 🛑</button>`;
      }
    } else {
      html += '<div style="font-weight:bold; color:var(--text-muted);">Warte auf den Host...</div>';
    }

    html += '</div>';
    setHTML('play-content', html);
  },

  broadcastEnd() {
    Multiplayer.sendGameState({ type: 'kmk_end' });
  },

  renderGameOver() {
    this.stopTimer();
    setHTML('play-content', `
      <div class="card kmk-game-over">
        <h1 style="color:var(--primary); font-size: 2.5rem;">Spiel Beendet!</h1>
        <p class="muted">Alle Runden wurden gespielt.</p>
        <div class="kmk-final-stats">
          <h3>Danke fürs Mitspielen!</h3>
          <p>Hoffentlich haben alle überlebt... 🔪</p>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          ${Multiplayer.role === 'host' ? `
            <button class="btn-primary" onclick="KmkGame.onOnlineGameStart(KmkGame.collectOnlineSettings())">Nochmal spielen 🔄</button>
          ` : ''}
          <button class="btn-primary" style="${Multiplayer.role === 'host' ? 'background:var(--surface2); color:var(--text);' : ''}" onclick="KmkGame.returnToLobby()">Lobby 🏠</button>
          <button class="btn-secondary" onclick="Router.go('home')">Hauptmenü 🚪</button>
        </div>
      </div>
    `);
  },

  returnToLobby() {
    this.stopTimer();
    if (Multiplayer.role === 'host') {
      this._updateHostLobby();
    } else {
      UnifiedLobby._renderGuestLobby();
    }
  },

  _updateHostLobby() {
    if (typeof UnifiedLobby !== 'undefined') {
      UnifiedLobby._updateHostLobby();
    }
  }
};
</script>

const KritzelGame = {
  name: "Kritzel-Kette",
  state: {
    mode: null,
    players: [], // Offline: strings. Online: {id, name, connection}
    activePackageIds: ['standard'],
    round: 0,
    p_index: 0, // offline current player index
    chains: [],
    myName: '', // guest
    submissions: 0, // online
    timeLimitDraw: 60,
    timeLimitGuess: 30,
    startWithWriting: false, // New setting: Write own word at start?
    timerInterval: null,
    timeLeft: 0,
    shift: 1 // Randomized shift for chain distribution
  },

  /* ================= UnifiedLobby v2 HOOKS ================= */

  // Called by UnifiedLobby to collect settings before broadcasting game_start
  collectOnlineSettings() {
    return {
      activePackageIds: [...this.state.activePackageIds],
      timeLimitDraw: this.state.timeLimitDraw,
      timeLimitGuess: this.state.timeLimitGuess,
      startWithWriting: this.state.startWithWriting
    };
  },

  // Called on BOTH host and guest when host clicks "Spiel starten"
  onOnlineGameStart(settings) {
    this.state.activePackageIds = settings.activePackageIds || ['standard'];
    this.state.timeLimitDraw = settings.timeLimitDraw || 60;
    this.state.timeLimitGuess = settings.timeLimitGuess || 30;
    this.state.startWithWriting = !!settings.startWithWriting;

    Router.go('play');
    document.getElementById('play-game-name').textContent = 'KritzelKette';

    if (Multiplayer.role === 'host') {
      this.startActualOnlineGame();
    } else {
      document.getElementById('play-content').innerHTML = `
        <div class="card" style="text-align:center; padding: 40px 10px;">
          <h3>⏳ Warte auf den Host...</h3>
        </div>
      `;
    }
  },

  // Called by UnifiedLobby for game-specific data (drawings, guesses, results)
  handleOnlineData(data, conn) {
    const s = this.state;

    // HOST receives data
    if (Multiplayer.role === 'host') {
      if (data.type === 'action') {
        s.submissions = s.submissions || 0;
        const chain = s.chains[data.chainIndex];
        if (chain) {
          chain.entries.push({ type: data.actionType, playerId: data.myId, playerName: data.name, value: data.value });
        }
        s.submissions++;

        if (s.submissions >= s.players.length) {
          s.submissions = 0;
          s.round++;
          this.nextOnlineRound();
        }
      }
    }
    // GUEST receives data
    else {
      if (data.type === 'turn') {
        s.round = data.round;
        s.myTurnData = data;
        s.isGameOver = false;
        this.renderActionScreen(data.actionType, data.prevValue, data.chainIndex, data.isOnline);
      } else if (data.type === 'results') {
        s.chains = data.chains;
        this.renderResultScreen();
      }
    }
  },

  open() {
    // Start Screen
    Router.go('setup');
    document.getElementById('setup-title').textContent = 'KritzelKette';
    
    document.getElementById('setup-content').innerHTML = `
      <div class="card">
        <div class="card-label">W\u00E4hle deinen Modus</div>
        <button class="btn-primary" style="margin-bottom:15px; background:var(--green); color:#000;" onclick="KritzelGame.setupOffline()">
           \uD83D\uDCF1 Offline (Ein Ger\u00E4t teilen)

        <button class="btn-primary" onclick="UnifiedLobby.open(KritzelGame)">
           \uD83C\uDF10 Online (Jeder ein Ger\u00E4t)

  },

  /* ================= OFFLINE SETUP ================= */
  setupOffline() {
    this.state.mode = 'offline';
    this.state.players = ['Anna', 'Bert', 'Clara'];
    this.renderOfflineStart();
  },

  renderOfflineStart() {
    let ht = `

        <div class="players-list" id="kk-players-list"></div>
        <button class="btn-primary" style="background:var(--surface2); color:var(--text); margin-top:10px; font-size: 0.9rem;" onclick="KritzelGame.addOfflinePlayer()">＋ Spieler hinzufügen</button>

        <div class="card-label">⚙️ Spiel-Regeln</div>

              </div>
              <div class="toggle-switch">
                <input type="checkbox" id="kk-write-toggle-off" ${this.state.startWithWriting ? 'checked' : ''} onchange="KritzelGame.state.startWithWriting = this.checked; KritzelGame.renderOfflineStart()">
                <span class="slider"></span>
              </div>
           </div>
        </div>
      </div>
      
      ${!this.state.startWithWriting ? `
      <div class="card">
        <div class="card-label">📦 Wörter-Pakete</div>
        <div class="packages-grid" id="kk-pkg-grid"></div>
      </div>
      ` : ''}
      <div class="card">

  initChains() {
    const s = this.state;
    const n = s.players.length;
    
    // Create N chains for N players
    s.chains = [];
    
    // Randomize shift sequence for rounds 1..N-1
    s.shiftSequence = Array.from({length: n - 1}, (_, i) => i + 1);
    for (let i = s.shiftSequence.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [s.shiftSequence[i], s.shiftSequence[j]] = [s.shiftSequence[j], s.shiftSequence[i]];
    }
    // Shift 0 is always 0 (everyone starts their own chain)
    s.shiftSequence.unshift(0);

    let pool = [];
    if (!s.startWithWriting) {
      for(const pkg of KritzelPackages) {
        if(s.activePackageIds.includes(pkg.id)) pool.push(...pkg.tasks);
      }
      pool.sort(() => Math.random() - 0.5);
    }

    if (s.mode === 'offline') {
        for(let i=0; i<n; i++) {
            s.chains.push({
                id: i,
                initiator: s.players[i],
                entries: s.startWithWriting ? [] : [ { type: 'word', value: pool[i % pool.length] || 'Sonne', playerName: 'System' } ]
            });
        }
    } else {
        for(let i=0; i<n; i++) {
            let p = s.players[i];
            s.chains.push({
                id: i,
                initiator: p.name,
                ownerId: p.id,
                entries: s.startWithWriting ? [] : [ { type: 'word', value: pool[i % pool.length] || 'Sonne', playerName: 'System' } ]
            });
        }
    }
  },

  /* ================= OFFLINE GAME FLOW ================= */
  nextOfflineTurn() {
    const s = this.state;
    const n = s.players.length;
    
    if (s.round > n) {
      this.renderResultScreen();
      return;
    }
    
    if (s.p_index >= n) {
      s.p_index = 0;
      s.round++;
      this.nextOfflineTurn();
      return;
    }
    
    const currPlayerName = s.players[s.p_index];
    
    // Calculate cumulative shift up to current round
    let totalShift = 0;
    for (let i = 0; i < s.round; i++) totalShift += s.shiftSequence[i];
    const chainIndex = (s.p_index - totalShift + n * 100) % n;
    const currentChain = s.chains[chainIndex];
    
    if (s.startWithWriting && s.round === 1) {
      const ht = `
        <div class="card" style="text-align:center; padding: 50px 20px;">
          <div class="card-label">Runde ${s.round} / ${n}</div>
          <h2 style="font-size:2rem; margin-bottom: 20px;">Anfangswort schreiben</h2>
          <p style="color:var(--text-muted); font-size:1.1rem; font-weight:bold; margin-bottom: 40px;">Zugeordnet zu:<br><span style="font-size: 2rem; color:var(--primary);">${currPlayerName}</span></p>
          <button class="btn-primary" style="font-size:1.3rem; padding: 20px;" onclick="KritzelGame.renderActionScreen('write', '', ${chainIndex}, false)">Ich bin bereit!</button>
        </div>
      `;
      document.getElementById('play-content').innerHTML = ht;
    } else {
      const lastEntry = currentChain.entries[currentChain.entries.length - 1];
      let ht = `
        <div class="card" style="text-align:center; padding: 50px 20px;">
          <div class="card-label">Runde ${s.round} / ${n}</div>
          <h2 style="font-size:2rem; margin-bottom: 20px;">Schritt ${s.round} / ${n}</h2>
          <p style="color:var(--text-muted); font-size:1.1rem; font-weight:bold; margin-bottom: 40px;">Zugeordnet zu:<br><span style="font-size: 2rem; color:var(--primary);">${currPlayerName}</span></p>
          <button class="btn-primary" style="font-size:1.3rem; padding: 20px;" onclick="KritzelGame.launchOfflineAction(${chainIndex}, '${lastEntry.type}', \`${lastEntry.value.replace(/`/g, '')}\`)">Ich bin bereit!</button>
        </div>
      `;
      document.getElementById('play-content').innerHTML = ht;
    }
  },

  launchOfflineAction(chainIndex, lastType, lastValue) {
    const actionType = lastType === 'drawing' ? 'guess' : 'drawing';
    this.renderActionScreen(actionType, lastValue, chainIndex, false);
  },

  submitOfflineAction(chainIndex, actionType, value) {
    const s = this.state;
    const currPlayerName = s.players[s.p_index];
    s.chains[chainIndex].entries.push({
      type: actionType,
      playerName: currPlayerName,
      value: value
    });
    s.p_index++;
    this.nextOfflineTurn();
  },

  /* ================= ONLINE GAME FLOW (HOST DRIVEN) ================= */
  nextOnlineRound() {
    const s = this.state;
    const n = s.players.length;
    
    if (s.round > n) {
      Multiplayer.sendGameState({ type: 'results', chains: s.chains });
      this.renderResultScreen();
      return;
    }

    const hostStatus = document.getElementById('host-status');
    if(hostStatus) hostStatus.innerHTML = `Runde ${s.round} / ${n} läuft.<br>Warte auf Spieler...`;

    // Distribute turns
    for(let i=0; i<n; i++) {
        const player = s.players[i];
        
        // Logical shift ensures player gets a different chain every round.
        let chainIndex;
        let actionType;
        let prevValue = '';

        if (s.startWithWriting && s.round === 1) {
          chainIndex = i; 
          actionType = 'write';
        } else {
          let totalShift = 0;
          for (let k = 0; k < s.round; k++) totalShift += s.shiftSequence[k];
          chainIndex = (i - totalShift + n * 100) % n;
          
          const currentChain = s.chains[chainIndex];
          const lastEntry = currentChain.entries[currentChain.entries.length - 1];
          actionType = lastEntry.type === 'drawing' ? 'guess' : 'drawing';
          prevValue = lastEntry.value;
        }
        
        const payload = {
            type: 'turn',
            round: s.round,
            chainIndex: chainIndex,
            actionType: actionType,
            prevValue: prevValue,
            isOnline: true
        };

        if(player.id === 'host-1') {
            s.myTurnData = payload;
            Router.go('play');
            this.renderActionScreen(actionType, prevValue, chainIndex, true);
        } else {
            if(player.connection) player.connection.send(payload);
        }
    }
  },

  submitOnlineAction(chainIndex, actionType, value) {
    const s = this.state;
    const myId = Multiplayer.myId || 'host-1';
    const myName = s.myName || 'Host';

    if (Multiplayer.role === 'host') {
        const chain = s.chains[chainIndex];
        chain.entries.push({ type: actionType, playerId: myId, playerName: myName, value: value });
        s.submissions = (s.submissions || 0) + 1;
        
        document.getElementById('play-content').innerHTML = `
          <div class="card" style="text-align:center; padding: 40px 10px;">
            <h3>Eingereicht!</h3>
            <p>Warte auf restliche Spieler... (${s.submissions}/${s.players.length})</p>
          </div>
        `;

        
        if (s.submissions >= s.players.length) {
            s.submissions = 0;
            s.round++;
            this.nextOnlineRound();
        }
    } else {
        // Guest submission
        Multiplayer.sendToHost({
            type: 'action',
            chainIndex, actionType, value, myId, name: myName
        });
        document.getElementById('play-content').innerHTML = `
          <div class="card" style="text-align:center; padding: 40px 10px;">
            <h3>Eingereicht!</h3>
            <p style="color:var(--text-muted); margin-top:20px;">Warte darauf, dass alle Spieler fertig sind...</p>
          </div>
        `;
    }
  },

    this.state.timerInterval = setInterval(() => {
        this.state.timeLeft--;
        if(disp) disp.textContent = this.state.timeLeft;
        if(this.state.timeLeft <= 0) {
            clearInterval(this.state.timerInterval);
            if(actionType === 'drawing') this.finishDrawing(chainIndex, isOnline);
            else if(actionType === 'write') this.finishWrite(chainIndex, isOnline);
            else this.finishGuess(chainIndex, isOnline);
        }
    }, 1000);
  },

  /* ================= CANVAS LOGIC ================= */
  initCanvas() {
    const canvas = document.getElementById('kk-canvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    
    // We need to scale internal resolution to match displayed CSS size for good quality on mobile -> For simplicity we keep it 400x400 internally
    // Actually fixed width/height attributes are better, let's make it 400x400 internally
    canvas.width = 400;
    canvas.height = 400;
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    this.ctx = ctx;
    this.canvas = canvas;
    this.setBrush('#000000', 4);
    
    let drawing = false;
    
    const getPos = (e) => {
        let rect = canvas.getBoundingClientRect();
        let clientX = e.clientX;
        let clientY = e.clientY;
        if(e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    };

    const start = (e) => {
        e.preventDefault();
        drawing = true;
        let pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    };

    const draw = (e) => {
        if(!drawing) return;
        e.preventDefault();
        let pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    };

    const stop = (e) => {
        if(drawing) { e.preventDefault(); drawing = false; ctx.closePath(); }
    };

    canvas.addEventListener('mousedown', start, {passive:false});
    canvas.addEventListener('mousemove', draw, {passive:false});
    canvas.addEventListener('mouseup', stop, {passive:false});
    canvas.addEventListener('mouseout', stop, {passive:false});

    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', draw, {passive:false});
    canvas.addEventListener('touchend', stop, {passive:false});
    canvas.addEventListener('touchcancel', stop, {passive:false});
  },

  setBrush(color, size) {
    if(this.ctx) {
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = size;
    }
  },
  
  clearCanvas() {
    if(this.ctx && this.canvas) {
        this.ctx.fillStyle = '#ffffff';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    }
  },

  finishDrawing(chainIndex, isOnline) {
    clearInterval(this.state.timerInterval);
    if(!this.canvas) return;
    const base64 = this.canvas.toDataURL('image/jpeg', 0.8);
    if(isOnline) this.submitOnlineAction(chainIndex, 'drawing', base64);
    else this.submitOfflineAction(chainIndex, 'drawing', base64);
  },

  finishGuess(chainIndex, isOnline) {
    clearInterval(this.state.timerInterval);
    const input = document.getElementById('kk-guess-input');
    let val = input ? input.value.trim() : '';
    if(!val) val = "???"; // fallback
    if(isOnline) this.submitOnlineAction(chainIndex, 'guess', val);
    else this.submitOfflineAction(chainIndex, 'guess', val);
  },

  finishWrite(chainIndex, isOnline) {
    clearInterval(this.state.timerInterval);
    const input = document.getElementById('kk-write-input');
    let val = input ? input.value.trim() : '';
    if(!val) {
      // Pick random word if they sent nothing
      let pool = [];
      KritzelPackages.forEach(p => pool = pool.concat(p.tasks));
      val = pool[Math.floor(Math.random() * pool.length)] || 'Abenteuer';
    }
    if(isOnline) this.submitOnlineAction(chainIndex, 'word', val);
    else this.submitOfflineAction(chainIndex, 'word', val);
  },

  /* ================= RESULT SCREEN ================= */
  renderResultScreen() {
    clearInterval(this.state.timerInterval);
    Router.go('play');
    document.getElementById('play-game-name').textContent = 'Ergebnisse!';
    
    const chains = this.state.chains;
    let ht = `<div style="text-align:center; margin-bottom: 20px;"><p style="color:var(--text-muted);">Schaut euch die Ergebnisse an!</p></div>`;
    
    chains.forEach(c => {
       ht += `
        <div class="card" style="margin-bottom: 30px; animation: slideIn .4s cubic-bezier(.34, 1.15, .64, 1) both; overflow:hidden;">
            <div style="background: var(--surface2); margin: -22px -22px 20px -22px; padding: 15px 22px; border-bottom: 1px solid var(--border);">
               <strong style="color:var(--primary); font-family:'Abril Fatface', cursive; font-size: 1.4rem;">Startwort: ${c.entries[0].value}</strong>
               <p style="font-size:0.8rem; color:var(--text-muted);">(Begonnen von ${c.entries[0].playerName})</p>
            </div>
       `;
       
       for(let i=1; i<c.entries.length; i++) {
           const e = c.entries[i];
           ht += `<div style="margin-bottom: 20px; padding-left: 15px; border-left: 2px dashed ${e.type === 'drawing' ? 'var(--cyan)' : 'var(--secondary)'};">`;
           if(e.type === 'drawing') {
              ht += `<p style="font-size:0.8rem; color:var(--text-muted); margin-bottom: 5px;"><strong>${e.playerName}</strong> zeichnete:</p>`;
              ht += `<img src="${e.value}" style="width:100%; max-width:300px; border-radius: 8px; border: 2px solid var(--surface2);">`;
           } else {
              ht += `<p style="font-size:0.8rem; color:var(--text-muted); margin-bottom: 5px;"><strong>${e.playerName}</strong> tippte:</p>`;
              ht += `<h3 style="color:var(--secondary); font-size:1.5rem; font-weight:900;">"${e.value}"</h3>`;
           }
           ht += `</div>`;
       }
       ht += `</div>`;
    });
    
    if (Multiplayer.role === 'host') {
        ht += `<button class="btn-primary" style="background:var(--cyan); color:#000;" onclick="UnifiedLobby._updateHostLobby()">Zurück zur Lobby</button>`;
    } else {
        ht += `<button class="btn-primary" onclick="Router.go('home')">Zurück zum Hauptmenü</button>`;
    }
    ht += `<br><br><br>`;

    document.getElementById('play-content').innerHTML = ht;
  }

};
</script>
<script>
/* === lobby.js === */
/* ===================================================
   UnifiedLobby v2 — Inspired by Spektrum's online lobby
   Features:
   - Host: Raum erstellen, Code teilen, Name ändern, spielspezifische Einstellungen
   - Guest: Mit Code beitreten, Name ändern, Spielerliste sehen, warte auf Host
   - Host broadcastet game_start + Einstellungen an alle Guests
   =================================================== */

const UnifiedLobby = {
  currentGame: null,
  isInLobby: false,

  /* ===== ENTRY POINT ===== */
  open(gameObj) {
    this.currentGame = gameObj;
    this.isInLobby = true;
    const gameName = (gameObj && gameObj.name) ? gameObj.name : 'Spiel';

    // Wire up Multiplayer callbacks
    this._wireCallbacks();

    // Show a simple Host/Join screen (Raum-Code based, like Spektrum)
    Router.go('setup');
    document.getElementById('setup-title').textContent = gameName + ' — Online';

    document.getElementById('setup-content').innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="card-label">🏠 Raum erstellen</div>
        <input type="text" id="ul-host-name" class="player-input" placeholder="Dein Name" value="Host" style="margin-bottom:15px;">
        <button class="btn-primary" onclick="UnifiedLobby.hostRoom()">Raum erstellen</button>
      </div>
      <div class="card" style="text-align:center;">
        <div class="card-label">🔑 Raum beitreten</div>
        <input type="text" id="ul-guest-name" class="player-input" placeholder="Dein Name" value="" style="margin-bottom:10px;">
        <input type="text" id="ul-join-code" class="player-input" placeholder="Raum-Code (z.B. AB12)" style="margin-bottom:15px; text-transform:uppercase;">
        <button class="btn-primary" onclick="UnifiedLobby.joinRoom()">Beitreten</button>
      </div>
    `;
  },

  /* ===== CLIPBOARD HELPER ===== */
  copyRoomCode() {
    const code = Multiplayer.hostId;
    if (!code) return;
    
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('ul-copy-btn');
      if (btn) {
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Kopiert! ✅';
        btn.classList.add('btn-success');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('btn-success');
        }, 2000);
      }
    }).catch(err => {
      console.error('Copy failed', err);
    });
  },

  /* ===== GENERATE 4-CHAR CODE ===== */
  _generateRoomCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  },

  /* ===== HOST: CREATE ROOM ===== */
  hostRoom() {
    const nameInput = document.getElementById('ul-host-name');
    const hostName = (nameInput && nameInput.value ? nameInput.value : '').trim() || 'Host';
    const roomCode = this._generateRoomCode();

    // Init game state
    this.currentGame.state.players = [{ id: 'host-1', name: hostName, connection: null }];
    this.currentGame.state.myName = hostName;
    this.currentGame.state.mode = 'online';

    Multiplayer.mode = 'internet';
    Multiplayer.createRoom(roomCode, hostName);

    // Show connecting screen
    Router.go('play');
    document.getElementById('play-game-name').textContent = this.currentGame.name + ' — Online';
    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 10px;">
        <div class="card-label">Raum wird erstellt...</div>
        <h3>Bitte kurz warten.</h3>
      </div>
    `;
  },

  /* ===== GUEST: JOIN ROOM ===== */
  joinRoom() {
    const nameInput = document.getElementById('ul-guest-name');
    const codeInput = document.getElementById('ul-join-code');
    const guestName = (nameInput && nameInput.value ? nameInput.value : '').trim();
    const code = (codeInput && codeInput.value ? codeInput.value : '').trim().toUpperCase();

    if (!guestName) return alert('Bitte gib deinen Namen ein!');
    if (!code) return alert('Bitte gib den Raum-Code ein!');

    this.currentGame.state.myName = guestName;
    this.currentGame.state.mode = 'online';

    Multiplayer.mode = 'internet';
    Multiplayer.joinRoom(code);

    // Show connecting screen
    Router.go('play');
    document.getElementById('play-game-name').textContent = this.currentGame.name + ' — Online';
    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 10px;">
        <div class="card-label">Verbinde...</div>
        <h3>Auf Host warten.</h3>
      </div>
    `;
  },

  /* ===== MULTIPLAYER CALLBACKS ===== */
  _wireCallbacks() {
    Multiplayer.onStatusChange = (status, msg) => this._handleStatus(status, msg);
    Multiplayer.onDataReceived = (data, conn) => this._handleData(data, conn);
    Multiplayer.onPlayerJoined = (conn) => { if (this.isInLobby) this._updateHostLobby(); };
    Multiplayer.onPlayerLeft = (conn) => {
      // Remove player from game state
      if (Multiplayer.role === 'host' && this.currentGame && this.currentGame.state) {
        this.currentGame.state.players = this.currentGame.state.players.filter(p => p.connection !== conn);
        if (this.isInLobby) this._updateHostLobby();
      }
    };
  },

  _handleStatus(status, msg) {
    if (status === 'connected') {
      if (Multiplayer.role === 'host') {
        if (this.isInLobby) this._updateHostLobby();
      } else if (Multiplayer.role === 'guest') {
        // Send join message to host
        Multiplayer.sendToHost({
          type: 'join',
          name: this.currentGame.state.myName,
          myId: Multiplayer.myId
        });
        // Show guest waiting screen
        this._renderGuestLobby();
      }
    } else if (status === 'error') {
      alert('Netzwerkfehler: ' + msg);
    }
  },

  _handleData(data, conn) {
    const game = this.currentGame;
    if (!game) return;

    // HOST receives data
    if (Multiplayer.role === 'host') {
      if (data.type === 'join') {
        // Add player if not already in list
        if (!game.state.players.find(p => p.id === data.myId)) {
          game.state.players.push({ id: data.myId, name: data.name, connection: conn });
          if (this.isInLobby) this._updateHostLobby();
          // Send updated player list and current state to all guests
          this._broadcastPlayerList();
        }
      } else if (data.type === 'name_change') {
        const player = game.state.players.find(p => p.id === data.myId);
        if (player) {
          player.name = data.name;
          if (this.isInLobby) this._updateHostLobby();
          this._broadcastPlayerList();
        }
      } else {
        // Forward game-specific data
        if (game.handleOnlineData) game.handleOnlineData(data, conn);
      }
    }
    // GUEST receives data
    else {
      if (data.type === 'player_list') {
        game.state.players = data.players.map(p => ({ id: p.id, name: p.name, connection: null }));
        this._renderGuestLobby();
      } else if (data.type === 'game_start') {
        // Host says go! Pass settings along
        if (game.onOnlineGameStart) {
          game.onOnlineGameStart(data.settings || {});
        }
      } else {
        // Forward game-specific data
        if (game.handleOnlineData) game.handleOnlineData(data, conn);
      }
    }
  },

  _broadcastPlayerList() {
    const game = this.currentGame;
    if (!game) return;
    Multiplayer.sendGameState({
      type: 'player_list',
      players: game.state.players.map(p => ({ id: p.id, name: p.name }))
    });
  },

  /* ===== HOST LOBBY UI ===== */
  _updateHostLobby() {
    this.isInLobby = true;
    if (Multiplayer.role !== 'host') return;
    const game = this.currentGame;

    // Game-specific HTML (packages, timer, etc.)
    let setupHTML = '';
    if (game.renderHostSetup) setupHTML = game.renderHostSetup();

    let playerListHTML = game.state.players.map(p => `
      <div style="background:var(--surface2); padding:10px 15px; border-radius:8px; margin-bottom:5px; font-weight:bold; display:flex; align-items:center; gap:8px;">
        <span>👤</span> ${p.name} ${p.id === 'host-1' ? '<span style="color:var(--primary); font-size:0.8em;">(Host)</span>' : ''}
      </div>
    `).join('');

    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="card-label">Raum-Code</div>
        <h1 style="color:var(--primary); font-size: 3rem; letter-spacing: 0.15em; font-family:'Abril Fatface', cursive; margin:10px 0;">${Multiplayer.hostId}</h1>
        <button id="ul-copy-btn" class="btn-primary" style="background:#ff3366; color:white; font-size:0.8rem; padding: 10px 25px; margin-bottom:10px; width: auto; border:none;" onclick="UnifiedLobby.copyRoomCode()">Kopieren 📋</button>
        <p style="color:var(--text-muted); font-size:0.85rem;">Teile diesen Code mit deinen Mitspielern</p>
      </div>
      <div class="card">
        <div class="card-label">👥 Spieler (${game.state.players.length})</div>
        <div class="players-list">${playerListHTML}</div>
      </div>
      <div class="card">
        <div class="card-label">Dein Name</div>
        <div style="display:flex; gap:8px;">
          <input type="text" id="ul-host-name-change" class="player-input" value="${game.state.myName}" style="flex:1;">
          <button class="btn-primary" style="white-space:nowrap;" onclick="UnifiedLobby._changeHostName()">✓ Ändern</button>
        </div>
      </div>
      ${setupHTML}
      <button class="btn-primary" style="margin-top:15px; font-size: 1.3rem; padding: 20px; width:100%;" onclick="UnifiedLobby._startGame()">🚀 Spiel starten</button>
    `;

    // Let the game do post-render work (e.g., rendering package toggles)
    if (game.onHostLobbyRendered) game.onHostLobbyRendered();
  },

  _changeHostName() {
    const input = document.getElementById('ul-host-name-change');
    const newName = (input && input.value ? input.value : '').trim();
    if (!newName) return;
    const game = this.currentGame;
    game.state.myName = newName;
    const hostPlayer = game.state.players.find(p => p.id === 'host-1');
    if (hostPlayer) hostPlayer.name = newName;
    this._updateHostLobby();
    this._broadcastPlayerList();
  },

  _startGame() {
    const game = this.currentGame;
    // Collect game-specific settings
    let settings = {};
    if (game.collectOnlineSettings) settings = game.collectOnlineSettings();

    // Broadcast start to all guests
    Multiplayer.sendGameState({ type: 'game_start', settings: settings });

    // Start game locally on host
    if (game.onOnlineGameStart) {
      this.isInLobby = false;
      game.onOnlineGameStart(settings);
    }
  },

  /* ===== GUEST LOBBY UI ===== */
  _renderGuestLobby() {
    const game = this.currentGame;

    let playerListHTML = '';
    if (game.state.players && game.state.players.length > 0) {
      playerListHTML = game.state.players.map(p => `
        <div style="background:var(--surface2); padding:10px 15px; border-radius:8px; margin-bottom:5px; font-weight:bold; display:flex; align-items:center; gap:8px;">
          <span>👤</span> ${p.name}
        </div>
      `).join('');
    } else {
      playerListHTML = '<div style="color:var(--text-muted);">Warte auf Spielerliste...</div>';
    }

    document.getElementById('play-content').innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="card-label">Verbunden mit Raum</div>
        <h1 style="color:var(--primary); font-size: 3rem; letter-spacing: 0.15em; font-family:'Abril Fatface', cursive; margin:10px 0;">${Multiplayer.hostId}</h1>
        <button id="ul-copy-btn" class="btn-primary" style="background:#ff3366; color:white; font-size:0.8rem; padding: 10px 25px; margin-bottom:10px; width: auto; border:none;" onclick="UnifiedLobby.copyRoomCode()">Kopieren 📋</button>
        <div style="color:var(--green); font-weight:bold;">✅ Verbunden</div>
      </div>
      <div class="card">
        <div class="card-label">Dein Name</div>
        <div style="display:flex; gap:8px;">
          <input type="text" id="ul-guest-name-change" class="player-input" value="${game.state.myName}" style="flex:1;">
          <button class="btn-primary" style="white-space:nowrap;" onclick="UnifiedLobby._changeGuestName()">✓ Ändern</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">👥 Spieler im Raum</div>
        <div class="players-list">${playerListHTML}</div>
      </div>
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--text-muted);">⏳ Warte darauf, dass der Host das Spiel startet...</h3>
      </div>
    `;
  },

  _changeGuestName() {
    const input = document.getElementById('ul-guest-name-change');
    const newName = (input && input.value ? input.value : '').trim();
    if (!newName) return;
    this.currentGame.state.myName = newName;
    Multiplayer.sendToHost({
      type: 'name_change',
      myId: Multiplayer.myId,
      name: newName
    });
  }
};
</script>
